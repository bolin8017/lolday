server {
  listen 8080 default_server;
  server_name _;
  root /usr/share/nginx/html;

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Healthcheck for kubelet + Docker HEALTHCHECK
  location = /healthz { return 200 "ok"; }

  gzip on;
  gzip_types text/css application/javascript image/svg+xml application/json;

  # Security headers — see docs/superpowers/plans/2026-05-14-security-hardening-p5-audit-observability.md §T7.
  #
  # script-src 'self'       — block all inline + remote JS (no CDN scripts allowed).
  # style-src 'unsafe-inline' — required for Radix UI / recharts inline `style` attrs (D3).
  # frame-ancestors 'none'  — no embedding (also enforced by X-Frame-Options for legacy UAs).
  # upgrade-insecure-requests — auto-upgrade any http:// references in the bundle.
  # HSTS preload — header advertises preload eligibility; apex registration is a separate
  #                operator decision (D4) and is NOT done by this chart.
  #
  # NOTE on nginx add_header inheritance: per nginx docs, `add_header` directives are
  # inherited from outer scope ONLY if the child `location` block has NO `add_header`
  # of its own. Because `/index.html` and the asset regex block below each set their
  # own `Cache-Control`, we MUST repeat the security headers there too — otherwise the
  # SPA entry point (the most common request) silently ships without CSP/HSTS/COOP/CORP.
  add_header X-Content-Type-Options       "nosniff"                              always;
  add_header X-Frame-Options              "DENY"                                 always;
  add_header Referrer-Policy              "strict-origin-when-cross-origin"      always;
  add_header Content-Security-Policy      "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; form-action 'self'; upgrade-insecure-requests" always;
  add_header Permissions-Policy           "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
  add_header Cross-Origin-Opener-Policy   "same-origin"                          always;
  add_header Cross-Origin-Resource-Policy "same-origin"                          always;
  add_header Strict-Transport-Security    "max-age=63072000; includeSubDomains; preload" always;

  # Cache policy: index never cached; hashed assets cached aggressively.
  # Security headers MUST be repeated inside any location that defines its own
  # `add_header` (see note above).
  location = /index.html {
    add_header Cache-Control                "no-store"                             always;
    add_header X-Content-Type-Options       "nosniff"                              always;
    add_header X-Frame-Options              "DENY"                                 always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin"      always;
    add_header Content-Security-Policy      "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; form-action 'self'; upgrade-insecure-requests" always;
    add_header Permissions-Policy           "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
    add_header Cross-Origin-Opener-Policy   "same-origin"                          always;
    add_header Cross-Origin-Resource-Policy "same-origin"                          always;
    add_header Strict-Transport-Security    "max-age=63072000; includeSubDomains; preload" always;
  }
  location ~* \.(js|css|woff2|svg|png|ico)$ {
    expires 1y;
    add_header Cache-Control                "public, immutable"                    always;
    add_header X-Content-Type-Options       "nosniff"                              always;
    add_header X-Frame-Options              "DENY"                                 always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin"      always;
    add_header Content-Security-Policy      "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; form-action 'self'; upgrade-insecure-requests" always;
    add_header Permissions-Policy           "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
    add_header Cross-Origin-Opener-Policy   "same-origin"                          always;
    add_header Cross-Origin-Resource-Policy "same-origin"                          always;
    add_header Strict-Transport-Security    "max-age=63072000; includeSubDomains; preload" always;
  }
}
