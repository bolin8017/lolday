# mypy.ini — repo-root config for static type checking.
# Truth lives here, NOT in backend/pyproject.toml.

[mypy]
python_version = 3.12
files = backend/app
plugins = pydantic.mypy
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
check_untyped_defs = true
no_implicit_optional = true
strict_equality = true
# First-wave deliberately NOT enabled:
#   disallow_untyped_defs / disallow_incomplete_defs / disallow_any_*
# Removed incrementally as future phases touch each module.

[mypy-kubernetes.*]
ignore_missing_imports = true
[mypy-jsonschema.*]
ignore_missing_imports = true
[mypy-yaml.*]
ignore_missing_imports = true
[mypy-cachetools.*]
ignore_missing_imports = true
# app.reconciler: 20 Optional-handling errors (Detector | None,
# datetime | None, etc.) across the 57 KB fire-and-forget reconciler.
# Root-cause fix deferred to the phase that refactors reconciler.py.
# Tracked as tech debt in docs/architecture.md §9 #11.
[mypy-app.reconciler]
ignore_errors = true
