version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      actions-minor-patch:
        patterns: ["*"]
        update-types:
          - minor
          - patch

  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      backend-minor-patch:
        patterns: ["*"]
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      # @rjsf/core, @rjsf/utils, @rjsf/validator-ajv8 share peer-deps and
      # MUST move in lockstep. Ungrouped, each major bump arrives as its
      # own PR and CI fails for all three until the trio merges together
      # — the situation that produced #143/#144/#146 (closed in favour
      # of the coordinated v6 migration). First-matching-group wins per
      # Dependabot, so this entry must precede frontend-minor-patch to
      # capture minor/patch bumps too.
      rjsf:
        patterns: ["@rjsf/*"]
        update-types:
          - major
          - minor
          - patch
      frontend-minor-patch:
        patterns: ["*"]
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
      day: monday

  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly
      day: monday

  - package-ecosystem: docker
    directory: /charts/lolday/helpers/build-helper
    schedule:
      interval: weekly
      day: monday

  - package-ecosystem: docker
    directory: /charts/lolday/helpers/job-helper
    schedule:
      interval: weekly
      day: monday

  # mlflow-server and pytorch-cu12-base are intentionally NOT tracked by
  # dependabot. Both are manually pinned helper images per
  # .claude/rules/charts-and-helm.md ("Manually pinned (semantic tags)"):
  #   - mlflow-server tag carries the upstream MLflow version (e.g. v2.20.3)
  #     and bumping it requires a coordinated mlflow-skinny client upgrade
  #     in backend/pyproject.toml + proxy-test refresh.
  #   - pytorch-cu12-base is locked to CUDA 12.6 by host driver 560 on
  #     server30; the directory name itself encodes the constraint and the
  #     Dockerfile pins torch wheels to the cu126 index.
  # .github/workflows/helpers.yml already excludes both from CI build
  # verification. After H-21-img (P4 plan T3), both Dockerfiles also pin
  # their base image by @sha256:<digest>. Digest-only re-anchors of the
  # excluded helpers are surfaced by .github/workflows/trivy-cron.yml
  # (P4 plan T14) on a weekly cadence — when Trivy reports CRITICAL on
  # the current digest, the operator updates the Dockerfile FROM line
  # manually.
