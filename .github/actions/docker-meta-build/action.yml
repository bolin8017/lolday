name: docker-meta-build
description: Build (and optionally push) a Dockerfile to GHCR with mainstream tag rules.
inputs:
  image:
    description: Image short name (final segment after ghcr.io/bolin8017/, e.g. `lolday-backend`).
    required: true
  context:
    description: Build context path (relative to repo root).
    required: true
  push:
    description: '"true" to push, "false" to build only. Callers pass an event-conditional expression.'
    required: true
runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0
    - name: Login to GHCR
      if: inputs.push == 'true'
      uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}
    - name: Compute image metadata
      id: meta
      uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
      with:
        images: ghcr.io/bolin8017/${{ inputs.image }}
        tags: |
          type=ref,event=branch
          type=ref,event=branch,suffix=-{{sha}}
          type=sha,format=long
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=raw,value=latest,enable={{is_default_branch}}
    - name: Build and push
      uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
      with:
        context: ${{ inputs.context }}
        push: ${{ inputs.push }}
        # H-22: also load the image into the local docker daemon so the
        # Trivy step below can scan it by tag on PR events (no push). On
        # push events buildx loads + pushes; single-platform builds make
        # this compatible. If we ever add multi-arch matrices, revisit:
        # buildx cannot --load multi-platform manifests.
        load: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        # M-cache-poison: per-image + per-ref scope. A PR that poisons its
        # own cache namespace cannot bleed into main's cache. Cache hit rate
        # drops marginally for cross-ref builds; integrity is the priority.
        cache-from: type=gha,scope=${{ inputs.image }}-${{ github.ref_name }}
        cache-to: type=gha,scope=${{ inputs.image }}-${{ github.ref_name }},mode=max
    # H-22: Trivy CRITICAL gate. Runs on EVERY invocation (PR + push).
    # PR mode scans the locally-loaded image (via `load: true` above);
    # push mode scans the same image, now also resident in GHCR.
    # `image-ref` uses the first metadata tag — guaranteed present in
    # both modes and addressable in the local docker daemon. HIGH /
    # MEDIUM / LOW surface in the table output but don't fail the
    # build — Dependabot + future trivy-cron handle the long tail.
    - name: Trivy scan (H-22 CRITICAL gate)
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
      with:
        image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
        severity: CRITICAL
        exit-code: "1"
        ignore-unfixed: false
        format: table
    # H-22: Generate an SPDX SBOM and attach it as a Cosign-compatible
    # attestation. Runs only on push (PR builds skip — the image isn't
    # in a registry to attach to). Uses the immutable digest, not a tag,
    # so the SBOM survives tag-overwrite.
    - name: Generate SBOM (H-22 SPDX attestation)
      if: inputs.push == 'true'
      uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      with:
        image: ghcr.io/bolin8017/${{ inputs.image }}@${{ steps.meta.outputs.digest }}
        format: spdx-json
        output-file: sbom.spdx.json
        upload-artifact: true
        upload-release-assets: false
