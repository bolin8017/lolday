name: docker-meta-build
description: Build (and optionally push) a Dockerfile to GHCR with mainstream tag rules.
inputs:
  image:
    description: Image short name (final segment after ghcr.io/bolin8017/, e.g. `lolday-backend`).
    required: true
  context:
    description: Build context path (relative to repo root).
    required: true
  push:
    description: '"true" to push, "false" to build only. Callers pass an event-conditional expression.'
    required: true
runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0
    - name: Login to GHCR
      if: inputs.push == 'true'
      uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}
    - name: Compute image metadata
      id: meta
      uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
      with:
        images: ghcr.io/bolin8017/${{ inputs.image }}
        tags: |
          type=ref,event=branch
          type=ref,event=branch,suffix=-{{sha}}
          type=sha,format=long
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=raw,value=latest,enable={{is_default_branch}}
    - name: Build and push
      id: build
      uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
      with:
        context: ${{ inputs.context }}
        push: ${{ inputs.push }}
        # H-22: also load the image into the local docker daemon so the
        # Trivy step below can scan it by tag on PR events (no push). On
        # push events buildx loads + pushes; single-platform builds make
        # this compatible. If we ever add multi-arch matrices, revisit:
        # buildx cannot --load multi-platform manifests.
        load: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        # M-cache-poison: per-image + per-ref scope. A PR that poisons its
        # own cache namespace cannot bleed into main's cache. Cache hit rate
        # drops marginally for cross-ref builds; integrity is the priority.
        cache-from: type=gha,scope=${{ inputs.image }}-${{ github.ref_name }}
        cache-to: type=gha,scope=${{ inputs.image }}-${{ github.ref_name }},mode=max
    # H-22: Trivy CRITICAL gate. Runs on EVERY invocation (PR + push).
    # PR mode scans the locally-loaded image (via `load: true` above);
    # push mode scans the same image, now also resident in GHCR.
    # `image-ref` uses the first metadata tag — guaranteed present in
    # both modes and addressable in the local docker daemon. HIGH /
    # MEDIUM / LOW surface in the table output but don't fail the
    # build — Dependabot + future trivy-cron handle the long tail.
    #
    # ignore-unfixed: true — the gate blocks only on CRITICALs that have
    # an upstream fix available (the operator CAN act: bump the base image
    # digest). Unfixed CRITICALs are real but not actionable in CI; the
    # weekly trivy-cron (P4 plan T14) reports them so the operator can
    # monitor + apply mitigations (network policy, dependency carve-outs,
    # etc.) without blocking every push. Mainstream lolday policy already
    # echoes this — see charts/lolday/helpers/pytorch-cu12-base/Dockerfile
    # ("platform blocks on CRITICAL only" — meaning fixed CRITICAL).
    - name: Trivy scan (H-22 CRITICAL gate)
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
      with:
        image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
        severity: CRITICAL
        exit-code: "1"
        ignore-unfixed: true
        format: table
    # H-22 (SBOM): TEMPORARILY DISABLED — syft v1.42.3 via the sbom-action
    # exits 1 against GHCR-private images on GHA runners. With the
    # SYFT_REGISTRY_AUTH_* env path, syft authenticates and DOES print the
    # package inventory, but the syft binary still returns exit 1 (the
    # output stream appears to mix the package table with the SPDX JSON
    # payload — anchore/sbom-action then treats the result as malformed).
    # Containerd cataloger requires socket access that GHA runners
    # don't grant. Workaround approaches that need follow-up validation:
    #   - Add `docker pull <ref>` before sbom-action so syft scans the
    #     daemon-resident image, not a registry pull.
    #   - Use `scope: squashed` + `--quiet` to suppress table output.
    #   - Switch to `anchore/sbom-action` v0.25+ (when released) or to
    #     CycloneDX as an alternate format.
    # Cosign sign (next step) is unaffected and still attaches a Sigstore
    # attestation per image digest. Trivy gate (above) is also unaffected.
    # Filed as follow-up: re-enable SBOM with one of the approaches above
    # after a green smoke test on a feature branch.
    #
    # - name: Generate SBOM (H-22 SPDX attestation)
    #   if: inputs.push == 'true'
    #   uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
    #   env:
    #     SYFT_REGISTRY_AUTH_USERNAME: ${{ github.actor }}
    #     SYFT_REGISTRY_AUTH_PASSWORD: ${{ github.token }}
    #   with:
    #     image: ghcr.io/bolin8017/${{ inputs.image }}@${{ steps.build.outputs.digest }}
    #     format: spdx-json
    #     output-file: sbom.spdx.json
    #     upload-artifact: true
    #     upload-release-assets: false
    # H-23: install cosign for keyless OIDC signing. The action SHA is
    # pinned; the cosign binary itself defaults to the action's latest
    # stable release — same trust path as every other GHA action.
    - name: Install cosign
      if: inputs.push == 'true'
      uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
    # H-23: keyless sign the just-pushed image. OIDC token is
    # auto-acquired from the GHA OIDC issuer via id-token: write (granted
    # at the job level in images.yml / helpers.yml). --yes skips the
    # interactive prompt; --recursive signs every platform variant of a
    # multi-arch manifest (no-op today since builds are single-platform).
    #
    # Sign by the per-commit `sha-<full-sha>` tag (produced by
    # `type=sha,format=long` in the metadata-action step above). Why not
    # by digest? With `load: true` + `push: true`, buildx's
    # `outputs.digest` returns the LOCAL DAEMON manifest digest, which
    # diverges from the REGISTRY-side digest because buildx recomputes
    # the manifest when loading. Passing the daemon digest to cosign
    # produces MANIFEST_UNKNOWN against ghcr.io. Tag-based sign sidesteps
    # the issue — cosign resolves the tag to the current registry digest
    # at sign time and anchors the signature to that digest. Subsequent
    # tag overwrites do NOT invalidate the signature (it lives on the
    # digest, not the tag).
    - name: Cosign sign (H-23 keyless)
      if: inputs.push == 'true'
      shell: bash
      env:
        COSIGN_EXPERIMENTAL: "1"
      run: |
        cosign sign --yes --recursive \
          "ghcr.io/bolin8017/${{ inputs.image }}:sha-${{ github.sha }}"
