name: trivy-cron

on:
  schedule:
    # Mondays 09:00 UTC = 17:00 Asia/Taipei. Aligns with Dependabot's
    # weekly Monday schedule so all security signals land in the
    # operator's PR / issue review queue on the same day.
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scan-excluded-bases:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        # Each entry names the upstream base image referenced by the
        # respective helper Dockerfile after H-21-img digest pinning.
        # Updating this list when the helper's FROM changes is the
        # operator's job — Dependabot doesn't touch these helpers.
        image:
          - name: mlflow-server-base
            ref: "ghcr.io/mlflow/mlflow:v2.20.3"
          - name: pytorch-cu12-base
            ref: "nvidia/cuda:12.6.3-cudnn-runtime-ubuntu22.04"
    steps:
      - name: Trivy scan (CRITICAL,HIGH report-only)
        id: trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ matrix.image.ref }}
          severity: CRITICAL,HIGH
          # ignore-unfixed: false — trivy-cron is the long-tail watchtower
          # (the CI gate flips it to true for actionable signals only;
          # here we WANT unfixed CRITICALs so the operator monitors them).
          ignore-unfixed: false
          format: table
          # exit-code 0 always — we open an issue instead of failing the job.
          exit-code: "0"
          output: trivy-${{ matrix.image.name }}.txt

      - name: Check for CRITICAL findings
        id: gate
        shell: bash
        run: |
          if grep -qE "^Total: [1-9][0-9]* \([^)]*CRITICAL: [1-9]" "trivy-${{ matrix.image.name }}.txt"; then
            echo "has_critical=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_critical=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload full trivy report
        if: steps.gate.outputs.has_critical == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-${{ matrix.image.name }}
          path: trivy-${{ matrix.image.name }}.txt

      - name: Open issue on CRITICAL
        if: steps.gate.outputs.has_critical == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const full = fs.readFileSync('trivy-${{ matrix.image.name }}.txt', 'utf8');
            // GitHub issue bodies cap at 65536 characters; a full trivy
            // report on a python-heavy base image (mlflow-server-base
            // ships ~100+ dist-info METADATA rows) routinely blows past
            // that and 422s the create call. Keep the top of the report
            // (CVE table header + first ~25k chars of findings) and
            // point to the full text in the workflow artifact. 25k chars
            // is ~400 lines of trivy table output — enough to triage the
            // worst CVEs from the issue body alone.
            const HEAD_BUDGET = 25000;
            const truncated = full.length > HEAD_BUDGET;
            const head = truncated ? full.slice(0, HEAD_BUDGET) : full;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const footer = truncated
              ? `\n\n_Report truncated (${full.length} → ${HEAD_BUDGET} chars). Full text in workflow artifacts: ${runUrl} → artifact \`trivy-${{ matrix.image.name }}\`._\n`
              : '';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[trivy-cron] CRITICAL findings on ${{ matrix.image.ref }}`,
              body: '```\n' + head + '\n```' + footer + '\n\n' +
                    'Manual action: bump the FROM digest in ' +
                    '`charts/lolday/helpers/<helper>/Dockerfile`, rebuild, repush, ' +
                    'update values.yaml @sha256 pin (plan T1/T2/T3 process), open PR.',
              labels: ['security', 'trivy-cron'],
            });
