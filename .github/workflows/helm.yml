name: helm

on:
  push:
    branches: [main]
    paths:
      - "charts/**"
      - ".github/workflows/helm.yml"
  pull_request:
    branches: [main]
    paths:
      - "charts/**"
      - ".github/workflows/helm.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint-template:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.16.4

      - name: Cache sub-chart tgz
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: charts/lolday/charts
          key: ${{ runner.os }}-helm-deps-${{ hashFiles('charts/lolday/Chart.lock') }}

      - name: helm dependency update
        run: helm dependency update charts/lolday

      - name: helm lint
        run: helm lint charts/lolday

      - name: helm template (render-only sanity)
        run: |
          # backend.fernetKeys: whitespace-separated list of base64 keys
          # (P3 H-18b rename). Must NOT be the legacy public test value
          # ZmDfcTF7..., which Settings.validate_fernet_keys would reject
          # at backend boot in production.
          # redis.auth.password: required by the redis chart since P2 H-9.
          helm template lolday charts/lolday --namespace lolday \
            --set harbor.harborAdminPassword=fake-harbor-pw \
            --set backend.harborAdminPassword=fake-harbor-pw \
            --set backend.fernetKeys=fake-fernet-key-not-the-public-one \
            --set redis.auth.password=fake-redis-pw \
            --set postgresql.auth.password=fake-pg-pw \
            --set mlflow.db.password=fake-mlflow-pw \
            --set monitoring.grafana.adminPassword=fake-grafana-pw \
            --set monitoring.postgresExporter.password=fake-pg-exporter-pw \
            --set cloudflare.tunnelToken=fake-cf-tunnel-token \
            > /tmp/manifests.yaml

      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version 0.5.2

      - name: Run helm-unittest suites
        run: |
          cd charts/lolday
          helm unittest -f 'tests/*_test.yaml' .

      # 2026-05-17 audit follow-up #1 — promtool catches PromQL syntax
      # errors, unbalanced label matchers, invalid `for:` durations, and
      # other rule-file mistakes that helm-unittest cannot see
      # (helm-unittest only checks rendered YAML shape, not PromQL
      # semantics). Future PR that introduces a typo into a
      # `alertmanager-rules.yaml` PromQL block would have surfaced as
      # `PrometheusRuleFailures` at runtime — minutes-to-hours feedback
      # latency vs CI's seconds.
      #
      # Uses --show-only to render exactly the rules template (avoids
      # YAML parser confusion on tab characters in other templates) and
      # the upstream Prometheus container's `promtool` binary (pure Go,
      # no toolchain setup needed). Pinned-tag image since this is CI-
      # only test infra; container registry verification is delegated to
      # Docker Hub TLS.
      - name: promtool check rules (PromQL syntax + rule semantics)
        run: |
          helm template lolday charts/lolday --namespace lolday \
            --show-only templates/monitoring/alertmanager-rules.yaml \
            --set harbor.harborAdminPassword=fake \
            --set backend.harborAdminPassword=fake \
            --set backend.fernetKeys=fake \
            --set redis.auth.password=fake \
            --set postgresql.auth.password=fake \
            --set mlflow.db.password=fake \
            --set monitoring.grafana.adminPassword=fake \
            --set monitoring.postgresExporter.password=fake \
            --set cloudflare.tunnelToken=fake \
            > /tmp/rules-doc.yaml
          python3 - <<'PY'
          import sys
          import yaml

          doc = yaml.safe_load(open("/tmp/rules-doc.yaml"))
          if doc is None or doc.get("kind") != "PrometheusRule":
              sys.exit("alertmanager-rules.yaml did not render a PrometheusRule")
          if doc.get("metadata", {}).get("name") != "lolday-baseline":
              sys.exit(f"expected PrometheusRule name 'lolday-baseline', got {doc.get('metadata', {}).get('name')!r}")
          # promtool expects a top-level `groups:` key, NOT the K8s
          # CRD-style `spec.groups`. Extract and re-emit.
          with open("/tmp/rules.yaml", "w") as f:
              yaml.dump({"groups": doc["spec"]["groups"]}, f)
          PY
          docker run --rm --entrypoint=promtool -v /tmp:/work \
            prom/prometheus:v3.5.0 check rules /work/rules.yaml

      - name: Upload rendered manifests
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: helm-manifests-${{ github.run_id }}
          path: /tmp/manifests.yaml
          retention-days: 14
