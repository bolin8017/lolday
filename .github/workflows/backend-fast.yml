name: backend-fast

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-fast.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  pytest:
    name: pytest
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-uv
        with:
          working-directory: backend

      - name: Run fast tier (unit + integration + contract, no heavy)
        working-directory: backend
        run: |
          uv run pytest -m 'not heavy' \
            --cov=app --cov-report=xml --cov-report=term \
            --junitxml=junit.xml \
            -v --tb=short

      # Codecov upload — gate to non-fork PRs and push events.
      # The action no-ops with a warning when CODECOV_TOKEN is unset on a
      # private repo, so this step is safe before the operator wires the secret.
      - name: Upload coverage to Codecov
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload JUnit
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: junit-backend-fast-${{ github.run_id }}
          path: backend/junit.xml
