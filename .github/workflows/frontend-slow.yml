name: frontend-slow

# D3.3 — Playwright E2E + visual snapshots via the live-stack fixture
# (webServer launches uvicorn + vite dev). Informational only.

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-slow-${{ github.ref }}
  cancel-in-progress: false

jobs:
  playwright:
    name: playwright
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup uv
        uses: ./.github/actions/setup-uv
        with:
          working-directory: backend

      - name: Setup pnpm + node
        uses: ./.github/actions/setup-pnpm-node

      - name: Install playwright browsers
        run: pnpm --dir frontend exec playwright install --with-deps chromium

      - name: Run playwright (webServer launches uvicorn + vite dev)
        env:
          E2E_BASE_URL: http://127.0.0.1:5173
          DOCS_ENABLED: "true"
        run: pnpm --dir frontend playwright test

      - name: Upload trace + screenshots on failure
        if: failure()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: playwright-trace
          path: |
            frontend/test-results/
            frontend/playwright-report/
