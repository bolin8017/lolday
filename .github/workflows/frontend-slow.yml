name: frontend-slow

# D3.3 — Playwright E2E + visual snapshots via the live-stack fixture
# (webServer launches uvicorn + vite dev). Informational only.

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-slow-${{ github.ref }}
  cancel-in-progress: false

jobs:
  playwright:
    name: playwright
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup uv
        uses: ./.github/actions/setup-uv
        with:
          working-directory: backend

      - name: Setup pnpm + node
        uses: ./.github/actions/setup-pnpm-node

      - name: Install playwright browsers
        # Only chromium needed. `frontend/playwright.config.ts` overrides
        # the `iphone-13-mini` project's default `defaultBrowserType:
        # "webkit"` (from `devices["iPhone 13 Mini"]`) to `"chromium"`
        # so the same headless shell powers both projects. iPhone viewport
        # / userAgent / isMobile flags still come from
        # `devices["iPhone 13 Mini"]`. Drops 191 GTK/GStreamer apt deps
        # from the runner and lets the same env run user-local (no sudo
        # needed for `pnpm exec playwright install chromium`).
        # If WebKit-specific bug coverage is ever needed, add a third
        # explicit `webkit` project that opts back in.
        run: pnpm --dir frontend exec playwright install --with-deps chromium

      - name: Run playwright (webServer launches uvicorn + vite dev)
        env:
          E2E_BASE_URL: http://127.0.0.1:5173
          DOCS_ENABLED: "true"
          # Belt-and-braces: playwright.config.ts already passes this
          # into the spawned uvicorn via webServer.env. Setting it at
          # the step level guards a future warm-up step that boots
          # uvicorn outside playwright.config.ts.
          SPEC_LANE_STUBS: "true"
        run: pnpm --dir frontend exec playwright test

      - name: Upload trace + screenshots on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-trace
          path: |
            frontend/test-results/
            frontend/playwright-report/
