name: backend

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "frontend/**"
      - "charts/**"
      - "scripts/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "frontend/**"
      - "charts/**"
      - "scripts/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  pytest:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup uv + sync backend (with dev group)
        uses: ./.github/actions/setup-uv

      - name: Run pytest with coverage
        working-directory: backend
        run: uv run pytest -v --tb=short --cov=app --cov-report=xml --cov-report=term

      # Codecov upload. The action no-ops with a warning when CODECOV_TOKEN is
      # unset on a private repo, so this step is safe to land before the
      # operator wires the secret. Once Settings → Secrets has CODECOV_TOKEN,
      # uploads start appearing automatically.
      # M-codecov-gate: skip on fork PRs. GHA's fork-PR security model already
      # blocks secret access there, but the step previously ran unconditionally
      # — if a contributor's fork gains write access (or CODECOV_TOKEN leaks
      # via a build-log echo), the upload becomes an exfiltration sink. Gate
      # to push events + same-repo PRs only.
      - name: Upload coverage to Codecov
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: ./backend/coverage.xml
          flags: backend
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
