name: flaky-tracker

on:
  schedule:
    - cron: "0 6 * * 1" # 14:00 Asia/Taipei every Monday
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  aggregate:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download last 7 days of JUnit artifacts
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const since = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString();
            const { data: { artifacts } } = await github.rest.actions.listArtifactsForRepo({
              owner: 'bolin8017',
              repo: 'lolday',
              per_page: 100,
            });
            const recent = artifacts.filter(a =>
              a.name.startsWith('junit-') && a.created_at > since
            );
            console.log(`Found ${recent.length} recent JUnit artifacts`);
            const fs = require('fs');
            fs.mkdirSync('artifacts', { recursive: true });
            for (const art of recent) {
              const { data } = await github.rest.actions.downloadArtifact({
                owner: 'bolin8017',
                repo: 'lolday',
                artifact_id: art.id,
                archive_format: 'zip',
              });
              fs.writeFileSync(`artifacts/${art.id}.zip`, Buffer.from(data));
            }
            const { execSync } = require('child_process');
            const dir = 'artifacts';
            for (const entry of fs.readdirSync(dir)) {
              if (entry.endsWith('.zip')) {
                const sub = `${dir}/${entry.replace('.zip', '')}`;
                fs.mkdirSync(sub, { recursive: true });
                execSync(`unzip -q ${dir}/${entry} -d ${sub}`);
              }
            }

      - name: Run aggregator
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: bolin8017/lolday
        run: python3 scripts/lib/flaky_aggregate.py artifacts/
