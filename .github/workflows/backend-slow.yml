name: backend-slow

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
  schedule:
    - cron: "0 19 * * *" # 03:00 Asia/Taipei
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  pytest-heavy:
    name: pytest heavy
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-uv
        with:
          working-directory: backend

      # ubuntu-24.04 runners include Docker (socket exposed).
      # testcontainers-python detects the socket automatically — no services block needed.
      - name: Run heavy tier (testcontainers)
        working-directory: backend
        run: |
          uv run pytest -m heavy \
            --junitxml=junit-heavy.xml \
            -v --tb=short

      - name: Upload JUnit
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: junit-backend-slow-${{ github.run_id }}
          path: backend/junit-heavy.xml
