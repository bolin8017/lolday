name: mutation

on:
  schedule:
    - cron: "0 6 * * 1" # 14:00 Asia/Taipei every Monday
  workflow_dispatch:

permissions:
  contents: write # branch creation for the PR
  pull-requests: write # open the weekly report PR
  issues: write # open a tracking issue when any module is below the gate

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  mutmut:
    name: mutmut weekly
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-uv
        with:
          working-directory: backend

      - name: Run mutmut against top-10 risk modules
        working-directory: backend
        run: |
          # mutmut may exit non-zero when survived mutants are present;
          # that is the signal we want to capture, not the workflow's
          # fail/pass state. The render step below produces the report
          # regardless of mutmut's exit code.
          uv run mutmut run || true

      - name: Render Markdown report
        id: render
        working-directory: backend
        run: |
          DATE=$(date -u +%Y-%m-%d)
          mkdir -p ../docs/test-telemetry
          OUT="../docs/test-telemetry/mutation-${DATE}.md"
          uv run python -m scripts.lib.mutation_report \
            --mutants-dir mutants/ \
            --output "$OUT"
          echo "report=docs/test-telemetry/mutation-${DATE}.md" >> "$GITHUB_OUTPUT"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"

      - name: Open mutation-report PR
        # Branch protection on `main` (9 required check contexts) blocks
        # direct pushes — auto-commit-action returns "remote rejected".
        # The weekly report belongs in git history for trending, so the
        # workflow opens a PR instead and lets the operator merge it
        # after the required checks pass. The downstream "Open tracking
        # issue" step doesn't depend on the commit landing — it reads
        # the locally-rendered file via $REPORT_PATH.
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: "docs(test-telemetry): mutation report ${{ steps.render.outputs.date }}"
          title: "docs(test-telemetry): mutation report ${{ steps.render.outputs.date }}"
          body: |
            Automated weekly run of `.github/workflows/mutation.yml`.
            Adds `${{ steps.render.outputs.report }}`. Merge after the
            required checks pass; the tracking issue (if any) is
            opened independently and links back to the report path.
          branch: chore/mutation-report-${{ steps.render.outputs.date }}
          delete-branch: true
          add-paths: docs/test-telemetry/mutation-*.md
          labels: documentation

      - name: Open tracking issue on below-gate modules
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          REPORT_PATH: ${{ steps.render.outputs.report }}
        run: |
          if grep -q "BELOW 60%" "$REPORT_PATH"; then
            DATE="${{ steps.render.outputs.date }}"
            BODY=$(awk '/## Action items/,0' "$REPORT_PATH")
            gh issue create \
              -R bolin8017/lolday \
              -t "Mutation kill-rate below Phase 4 exit gate (${DATE})" \
              -l "tech-debt-tests" \
              -b "$(printf 'Auto-generated by .github/workflows/mutation.yml on %s. See %s for the full table.\n\n%s' "$DATE" "$REPORT_PATH" "$BODY")"
          else
            echo "All modules ≥60% — no issue opened."
          fi
