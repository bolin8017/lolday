name: frontend

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "backend/**"
      - "charts/**"
      - "scripts/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "backend/**"
      - "charts/**"
      - "scripts/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  unit:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm + install frontend
        uses: ./.github/actions/setup-pnpm-node

      - name: Typecheck
        run: pnpm --dir frontend typecheck

      - name: Vitest
        run: pnpm --dir frontend test

      # D3.8 / R5 part 4 — regen the OpenAPI snapshot from a live backend
      # and assert no drift. Backend OpenAPI drift fails the PR loud;
      # the contributor must `pnpm regen-openapi-snapshot` locally and
      # commit the refreshed snapshot.
      - name: Setup uv (for backend boot)
        uses: ./.github/actions/setup-uv
        with:
          working-directory: backend

      - name: Boot backend uvicorn for snapshot regen (background)
        env:
          AUTH_DEV_MODE: "true"
          AUTH_DEV_EMAIL: "admin@dev.local"
          ENVIRONMENT: "development"
          DATABASE_URL: "sqlite+aiosqlite:///file::memory:?cache=shared&uri=true"
          CF_ACCESS_TEAM_DOMAIN: ""
          CF_ACCESS_APP_AUD: ""
          # DOCS_ENABLED gates /openapi.json on the FastAPI app (post-
          # program review hardening — default off in prod). Snapshot
          # regen needs it on.
          DOCS_ENABLED: "true"
        run: |
          cd backend
          nohup uv run uvicorn app.main:app --host 127.0.0.1 --port 8000 \
            > /tmp/uvicorn.log 2>&1 &
          for i in {1..30}; do
            curl -fsSL http://127.0.0.1:8000/healthz && break || sleep 1
          done

      - name: Regen openapi snapshot — fail on drift
        run: |
          pnpm --dir frontend regen-openapi-snapshot
          git diff --exit-code -- frontend/tests/fixtures/openapi.snapshot.json \
            || (echo "::error::OpenAPI snapshot drift — run 'pnpm regen-openapi-snapshot' locally and commit." && exit 1)

  # Playwright E2E runs in the sibling workflow .github/workflows/frontend-slow.yml
  # (live since the §10 #34 frontend-slow stub layer landed 2026-05-17 — uvicorn +
  # vite are launched by playwright's webServer with SPEC_LANE_STUBS=true so the
  # backend boots without a real K8s cluster / MLflow / Postgres). Do NOT add a
  # second playwright invocation here; lint.yml + frontend.yml own the fast tier
  # (typecheck / lint / unit / OpenAPI snapshot), frontend-slow.yml owns E2E.
