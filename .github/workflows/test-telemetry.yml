name: test-telemetry

on:
  schedule:
    - cron: "30 6 * * 1" # 14:30 Asia/Taipei every Monday (30 min after mutation.yml)
  workflow_dispatch:

permissions:
  contents: write # branch creation for the PR
  pull-requests: write # open the dashboard-refresh PR
  actions: read # download artifacts

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  aggregate:
    name: aggregate JUnit + post Discord summary
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download last 7 days of JUnit artifacts
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const since = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString();
            const { data: { artifacts } } = await github.rest.actions.listArtifactsForRepo({
              owner: 'bolin8017',
              repo: 'lolday',
              per_page: 100,
            });
            const recent = artifacts.filter(a =>
              a.name.startsWith('junit-') && a.created_at > since
            );
            console.log(`Found ${recent.length} recent JUnit artifacts`);
            const fs = require('fs');
            fs.mkdirSync('artifacts', { recursive: true });
            for (const art of recent) {
              const { data } = await github.rest.actions.downloadArtifact({
                owner: 'bolin8017',
                repo: 'lolday',
                artifact_id: art.id,
                archive_format: 'zip',
              });
              fs.writeFileSync(`artifacts/${art.id}.zip`, Buffer.from(data));
            }
            const { execSync } = require('child_process');
            const dir = 'artifacts';
            for (const entry of fs.readdirSync(dir)) {
              if (entry.endsWith('.zip')) {
                const sub = `${dir}/${entry.replace('.zip', '')}`;
                fs.mkdirSync(sub, { recursive: true });
                execSync(`unzip -q ${dir}/${entry} -d ${sub}`);
              }
            }

      - name: Run aggregator
        run: |
          python3 -m scripts.lib.test_telemetry artifacts/ \
            --dashboard-out docs/test-telemetry/dashboard.md \
            --summary-out /tmp/discord-summary.txt

      # Post the Discord summary BEFORE attempting the PR, so a PR-create
      # failure (see next step) never blocks the user-visible signal.
      - name: Post summary to Spidey Warnings
        if: env.DISCORD_WEBHOOK_URL_WARNING != ''
        env:
          DISCORD_WEBHOOK_URL_WARNING: ${{ secrets.DISCORD_WEBHOOK_URL_WARNING }}
        run: |
          SUMMARY=$(cat /tmp/discord-summary.txt)
          jq -nc \
            --arg content "$SUMMARY" \
            '{content: $content}' \
            | curl -sS -X POST -H 'Content-Type: application/json' \
                --data @- "$DISCORD_WEBHOOK_URL_WARNING"

      - name: Open dashboard-refresh PR
        # Branch protection on `main` (9 required check contexts) blocks
        # direct pushes — auto-commit-action returns "remote rejected".
        # The dashboard belongs in git history for trending, so the
        # workflow opens a PR instead and lets the operator merge it
        # after the required checks pass. peter-evans/create-pull-request
        # detects "no changes" and exits cleanly on weeks when the
        # dashboard rendered identically to the previous run.
        #
        # `continue-on-error: true`: the default repo Actions setting
        # "Allow GitHub Actions to create and approve pull requests" is
        # OFF, so the PR-create REST call 422s with "GitHub Actions is
        # not permitted to create or approve pull requests". The branch
        # push still succeeds — the operator can land the branch via a
        # one-click manual PR. Making this step best-effort prevents the
        # whole workflow from going red over a known policy gap and lets
        # the Discord summary above always fire. Enable the setting (or
        # provide a dedicated PAT / GitHub App token via the action's
        # `token:` input) to make the PR-create succeed; the workflow
        # then automatically goes green end-to-end with no further edit.
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        continue-on-error: true
        with:
          commit-message: "docs(test-telemetry): weekly dashboard refresh"
          title: "docs(test-telemetry): weekly dashboard refresh"
          body: |
            Automated weekly run of `.github/workflows/test-telemetry.yml`.
            Refreshes `docs/test-telemetry/dashboard.md` from the last 7
            days of JUnit artifacts. Merge after the required checks
            pass; nothing else in the workflow depends on this commit
            landing on main.
          branch: chore/test-telemetry-dashboard-refresh
          delete-branch: true
          add-paths: docs/test-telemetry/dashboard.md
          labels: documentation
