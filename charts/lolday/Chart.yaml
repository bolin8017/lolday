apiVersion: v2
name: lolday
description: ISLab Malware Detector Management Platform
type: application
version: 0.21.3
# appVersion tracks `version` (semver). Bump together unless app and chart
# need to diverge intentionally. Phase-named appVersions ("phase12", "phase13b")
# are retired as of 2026-04-29 — see docs/conventions.md §4.
appVersion: "0.21.3"

dependencies:
  - name: harbor
    version: "1.18.3"
    repository: https://helm.goharbor.io
    condition: harbor.enabled
  - name: kube-prometheus-stack
    version: "~84.3.0"
    repository: https://prometheus-community.github.io/helm-charts
    alias: kps
    condition: monitoring.enabled
  - name: loki
    version: "~7.0.0"
    repository: https://grafana.github.io/helm-charts
    condition: loki.enabled
  - name: alloy
    version: "~1.8.0"
    repository: https://grafana.github.io/helm-charts
    condition: alloy.enabled
  - name: trivy-operator
    version: "~0.32.1"
    repository: https://aquasecurity.github.io/helm-charts
    condition: trivy-operator.enabled
  - name: volcano
    version: "~1.14.1"
    repository: https://volcano-sh.github.io/helm-charts
    condition: volcano.enabled
  - name: minio
    version: "5.4.0"
    repository: https://charts.min.io/
    condition: minio.enabled
  - name: kyverno
    version: "~3.8.0"
    repository: https://kyverno.github.io/kyverno/
    condition: kyverno.enabled
