suite: monitoring PrometheusRule
templates:
  - templates/monitoring/alertmanager-rules.yaml
values:
  - ../values-test.yaml
set:
  monitoring.enabled: true
release:
  name: lolday
  namespace: monitoring
chart:
  version: 0.0.0
  appVersion: test
tests:
  - it: renders a single PrometheusRule named lolday-baseline
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: PrometheusRule
      - equal:
          path: metadata.name
          value: lolday-baseline

  # lolday-baseline.rules group — verify the two key lolday-specific alerts
  # that the monitoring spec mandates are present. Using explicit group/index
  # paths since helm-unittest JSONPath-lite does not support wildcard filters.
  - it: group 0 (lolday-baseline.rules) contains LoldayBackendErrorRateElevated at rule index 4
    asserts:
      - equal:
          path: spec.groups[0].rules[4].alert
          value: LoldayBackendErrorRateElevated

  # lolday-resource-pressure.rules group — GpuSignalFailSafeStuck is the
  # fail-safe-stuck alert (scheduler goes fail-closed for 30m). Pinning its
  # position so renaming/moving it is caught by CI.
  - it: group 1 (lolday-resource-pressure.rules) contains GpuSignalFailSafeStuck at rule index 3
    asserts:
      - equal:
          path: spec.groups[1].rules[3].alert
          value: GpuSignalFailSafeStuck

  # Critical alerts must carry severity: critical.
  - it: LoldayCoreServiceDown alert carries severity critical
    asserts:
      - equal:
          path: spec.groups[0].rules[3].labels.severity
          value: critical

  # 5m for-window covers Harbor / backend rolling restarts (large-image
  # pulls + readiness probe wait can exceed 2m). Regression guard so a
  # future "tighten it back to 2m" PR can't slip through review.
  - it: LoldayCoreServiceDown for-window is 5m (rolling-deploy resilient)
    asserts:
      - equal:
          path: spec.groups[0].rules[3].for
          value: 5m

  # All three PrometheusRule groups must be present (baseline, resource-pressure, trivy).
  - it: PrometheusRule has 3 alert groups
    asserts:
      - lengthEqual:
          path: spec.groups
          count: 3

  # 2026-05-17 audit: LoldayDiscordNotifyDropped is the sibling alert
  # to LoldayDiscordNotifyFailing — it fires when notify.py's
  # _NOTIFY_SEM=20 saturates and a notify is silently dropped before
  # the HTTP attempt (stage="discord_notify_dropped"). Distinct from
  # discord_notify (which catches httpx exceptions / non-2xx). Pinned
  # at index 8 immediately after LoldayDiscordNotifyFailing (index 7).
  - it: group 0 (lolday-baseline.rules) contains LoldayDiscordNotifyDropped at rule index 8
    asserts:
      - equal:
          path: spec.groups[0].rules[8].alert
          value: LoldayDiscordNotifyDropped
      - equal:
          path: spec.groups[0].rules[8].labels.severity
          value: warning
      - equal:
          path: spec.groups[0].rules[8].for
          value: 10m
