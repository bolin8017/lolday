suite: backend deployment
templates:
  - templates/backend.yaml
values:
  - ../values-test.yaml
release:
  name: lolday
  namespace: lolday
chart:
  version: 0.0.0
  appVersion: test
tests:
  # backend.yaml renders 3 docs in order: Secret (0), Deployment (1), Service (2).
  - it: renders a Deployment as the second document
    documentIndex: 1
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: backend

  - it: uses the backend image from values
    documentIndex: 1
    set:
      backend.image: "ghcr.io/bolin8017/lolday-backend:v1.2.3@sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: ".*lolday-backend:v1.2.3"

  - it: drops all capabilities and disallows privilege escalation at container level
    documentIndex: 1
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - contains:
          path: spec.template.spec.containers[0].securityContext.capabilities.drop
          content: ALL

  - it: pod-level securityContext sets runAsNonRoot
    documentIndex: 1
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true

  - it: injects backend env via Secret reference named backend
    documentIndex: 1
    asserts:
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: backend
