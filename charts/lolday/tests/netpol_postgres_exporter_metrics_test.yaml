suite: postgres-exporter-metrics-from-monitoring-only NetworkPolicy
templates:
  - templates/netpol-postgres-exporter-metrics.yaml
values:
  - ../values-test.yaml
set:
  monitoring.enabled: true
  monitoring.postgresExporter.enabled: true
  monitoring.postgresExporter.password: "fake-test-pw"
  postgresql.enabled: true
release:
  name: lolday
  namespace: lolday
chart:
  version: 0.0.0
  appVersion: test
tests:
  - it: renders one NetworkPolicy in lolday ns
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: NetworkPolicy
      - equal:
          path: metadata.name
          value: postgres-exporter-metrics-from-monitoring-only
      - equal:
          path: metadata.namespace
          value: lolday

  - it: scopes the policy to postgres-exporter pods on ingress only
    asserts:
      - equal:
          path: spec.podSelector.matchLabels["app.kubernetes.io/name"]
          value: postgres-exporter
      - equal:
          path: spec.policyTypes
          value: [Ingress]

  - it: allows ingress from monitoring/prometheus on TCP 9187
    asserts:
      - contains:
          path: spec.ingress[0].from
          content:
            namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: monitoring
            podSelector:
              matchLabels:
                app.kubernetes.io/name: prometheus
      - contains:
          path: spec.ingress[0].ports
          content:
            protocol: TCP
            port: 9187

  - it: is gated off when monitoring.postgresExporter.enabled=false
    set:
      monitoring.postgresExporter.enabled: false
    asserts:
      - hasDocuments:
          count: 0
