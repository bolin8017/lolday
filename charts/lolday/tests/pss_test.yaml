suite: Pod Security Standards labels
templates:
  - templates/builds-namespace.yaml
  - templates/jobs-namespace.yaml
values:
  - ../values-test.yaml
release:
  name: lolday
  namespace: lolday
chart:
  version: 0.0.0
  appVersion: test
tests:
  # NOTE: The `lolday` main namespace has no chart template — it is expected
  # to be pre-existing on the cluster (K3s installs it as part of K8s core).
  # PSS label on `lolday` is applied out-of-band per docs/runbooks/pss-label-promotion.md.
  # Only the two namespaces with chart templates are tested here.

  # lolday-builds: enforce=privileged because the buildkit-seccomp-installer
  # DaemonSet needs hostPath (forbidden by baseline AND restricted per K8s PSS
  # reference table; only privileged allows it). This is the hotfix from PR #181.
  # audit + warn at restricted remain informational.
  - it: lolday-builds namespace enforces privileged PSS (hostPath required by seccomp installer)
    template: templates/builds-namespace.yaml
    documentIndex: 0
    asserts:
      - isKind:
          of: Namespace
      - equal:
          path: metadata.name
          value: lolday-builds
      - equal:
          path: metadata.labels["pod-security.kubernetes.io/enforce"]
          value: privileged
      - equal:
          path: metadata.labels["pod-security.kubernetes.io/audit"]
          value: restricted
      - equal:
          path: metadata.labels["pod-security.kubernetes.io/warn"]
          value: restricted

  # lolday-jobs: enforce=restricted since 2026-05-18 promotion (issue #186).
  # Pre-promotion the chart shipped enforce=baseline so BuildKit (in the
  # same ns) could keep elevated caps; BuildKit moved to `lolday-builds` in
  # chart 0.24.0 (2026-05-15) and the 3-day audit window after that move
  # showed zero PodSecurity violations across lolday + lolday-jobs, clearing
  # the ramp for full restricted enforcement. Runbook:
  # docs/runbooks/pss-label-promotion.md.
  - it: lolday-jobs namespace enforces restricted PSS (post 2026-05-18 promotion)
    template: templates/jobs-namespace.yaml
    documentIndex: 0
    asserts:
      - isKind:
          of: Namespace
      - equal:
          path: metadata.name
          value: lolday-jobs
      - equal:
          path: metadata.labels["pod-security.kubernetes.io/enforce"]
          value: restricted
      - equal:
          path: metadata.labels["pod-security.kubernetes.io/audit"]
          value: restricted
      - equal:
          path: metadata.labels["pod-security.kubernetes.io/warn"]
          value: restricted
