suite: AlertmanagerConfig routes
templates:
  - templates/monitoring/alertmanager-config-discord.yaml
values:
  - ../values-test.yaml
set:
  monitoring.enabled: true
release:
  name: lolday
  namespace: monitoring
chart:
  version: 0.0.0
  appVersion: test
tests:
  - it: renders a single AlertmanagerConfig named discord-receivers
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: AlertmanagerConfig
      - equal:
          path: metadata.name
          value: discord-receivers

  # 2026-05-10 alerting redesign: critical alerts route to discord-critical
  # (Captain Hook, @here). The route is a sub-route matched on severity=critical.
  - it: has a route with receiver discord-critical for critical severity
    asserts:
      - contains:
          path: spec.route.routes
          content:
            receiver: discord-critical
            matchers:
              - name: severity
                value: critical
                matchType: "="
            repeatInterval: 4h

  # 2026-05-10 alerting redesign: warning alerts route to discord-warning
  # (Spidey Warnings, no @here ping).
  - it: has a route with receiver discord-warning for warning severity
    asserts:
      - contains:
          path: spec.route.routes
          content:
            receiver: discord-warning
            matchers:
              - name: severity
                value: warning
                matchType: "="
            repeatInterval: 24h

  # 2026-05-10 spec §6.2 mandates exactly 5 inhibit rules.
  # Fewer = missing suppression (noise); more = unexpected new rule
  # that needs design review.
  - it: has exactly 5 inhibit rules per 2026-05-10 alerting redesign spec
    asserts:
      - lengthEqual:
          path: spec.inhibitRules
          count: 5

  # 2026-05-16: route severity=none alerts (Watchdog, InfoInhibitor) to
  # the `null` receiver — they're informational kps internals, not for
  # operator notification. The fall-through to discord-warning before
  # this rule landed surfaced them as `[WARNING] Watchdog` /
  # `[WARNING] InfoInhibitor` in Spidey Warnings.
  - it: has a route with receiver null for severity=none (Watchdog / InfoInhibitor)
    asserts:
      - contains:
          path: spec.route.routes
          content:
            receiver: "null"
            matchers:
              - name: severity
                value: none
                matchType: "="

  # Verify the three required receivers are declared (by name + index).
  # `contains` requires exact object match, so check names by index position
  # (null first, then discord-critical, then discord-warning — matches template order).
  - it: defines null, discord-critical, and discord-warning receivers
    asserts:
      - lengthEqual:
          path: spec.receivers
          count: 3
      - equal:
          path: spec.receivers[0].name
          value: "null"
      - equal:
          path: spec.receivers[1].name
          value: discord-critical
      - equal:
          path: spec.receivers[2].name
          value: discord-warning

  # The `null` receiver must be a true black hole — no discordConfigs,
  # no webhookConfigs, no integrations whatsoever. A typo / paste-from-
  # warning that adds discordConfigs here would re-leak severity=none
  # alerts to a Discord channel, defeating the fix.
  - it: null receiver has no integrations (true black hole)
    asserts:
      - notExists:
          path: spec.receivers[0].discordConfigs
      - notExists:
          path: spec.receivers[0].webhookConfigs
      - notExists:
          path: spec.receivers[0].emailConfigs
