suite: AlertmanagerConfig routes
templates:
  - templates/monitoring/alertmanager-config-discord.yaml
values:
  - ../values-test.yaml
set:
  monitoring.enabled: true
release:
  name: lolday
  namespace: monitoring
chart:
  version: 0.0.0
  appVersion: test
tests:
  - it: renders a single AlertmanagerConfig named discord-receivers
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: AlertmanagerConfig
      - equal:
          path: metadata.name
          value: discord-receivers

  # 2026-05-10 alerting redesign: critical alerts route to discord-critical
  # (Captain Hook, @here). The route is a sub-route matched on severity=critical.
  - it: has a route with receiver discord-critical for critical severity
    asserts:
      - contains:
          path: spec.route.routes
          content:
            receiver: discord-critical
            matchers:
              - name: severity
                value: critical
                matchType: "="
            repeatInterval: 4h

  # 2026-05-10 alerting redesign: warning alerts route to discord-warning
  # (Spidey Warnings, no @here ping).
  - it: has a route with receiver discord-warning for warning severity
    asserts:
      - contains:
          path: spec.route.routes
          content:
            receiver: discord-warning
            matchers:
              - name: severity
                value: warning
                matchType: "="
            repeatInterval: 24h

  # 2026-05-10 spec §6.2 + 2026-05-17 audit §10 follow-up: 5 original
  # lolday-internal inhibitions + 4 kps cause/effect cascade inhibitions
  # (LoldayCoreServiceDown → TargetDown / LoldayNodeMemoryPressure →
  # NodeMemoryHighUtilization / disk-fullness consolidation / KubePodCrashLooping).
  # Fewer = missing suppression (noise); more = unexpected new rule that
  # needs design review.
  - it: has exactly 9 inhibit rules (5 lolday-internal + 4 kps cascades)
    asserts:
      - lengthEqual:
          path: spec.inhibitRules
          count: 9

  # 2026-05-17 audit §10 follow-up: explicit assertion that the default
  # route receiver is `discord-warning` — the fail-loud fallthrough
  # design. Any future PR that changes this to `null` (silent drop) or
  # adds a new catch-all receiver would mask brand-new alerts; this
  # assertion is the regression guard against that drift.
  - it: default route receiver is discord-warning (fail-loud fallthrough for unknown severity)
    asserts:
      - equal:
          path: spec.route.receiver
          value: discord-warning

  # 2026-05-16: route severity=none alerts (Watchdog, InfoInhibitor) to
  # the `null` receiver — they're informational kps internals, not for
  # operator notification. The fall-through to discord-warning before
  # this rule landed surfaced them as `[WARNING] Watchdog` /
  # `[WARNING] InfoInhibitor` in Spidey Warnings.
  - it: has a route with receiver null for severity=none (Watchdog / InfoInhibitor)
    asserts:
      - contains:
          path: spec.route.routes
          content:
            receiver: "null"
            matchers:
              - name: severity
                value: none
                matchType: "="

  # 2026-05-17: route severity=info alerts to the `null` receiver —
  # kps ships 7 default rules with severity=info (CPUThrottlingHigh,
  # KubeQuotaAlmostFull, KubeQuotaFullyUsed, KubeNodeEviction,
  # KubeNodePressure, KubeletTooManyPods, NodeCPUHighUsage). All of
  # them either overlap our explicit severity=critical rules or are
  # telemetry surfaces visible in Grafana — none are paging-grade.
  # Without this route they fall through to discord-warning and surface
  # in Spidey Warnings as `[WARNING] CPUThrottlingHigh` etc. (same
  # rendering bug PR #206 closed for severity=none). Design:
  # docs/superpowers/specs/2026-05-17-discord-notification-audit-design.md §5.1.
  - it: has a route with receiver null for severity=info (kps defaults)
    asserts:
      - contains:
          path: spec.route.routes
          content:
            receiver: "null"
            matchers:
              - name: severity
                value: info
                matchType: "="

  # Verify the three required receivers are declared (by name + index).
  # `contains` requires exact object match, so check names by index position
  # (null first, then discord-critical, then discord-warning — matches template order).
  - it: defines null, discord-critical, and discord-warning receivers
    asserts:
      - lengthEqual:
          path: spec.receivers
          count: 3
      - equal:
          path: spec.receivers[0].name
          value: "null"
      - equal:
          path: spec.receivers[1].name
          value: discord-critical
      - equal:
          path: spec.receivers[2].name
          value: discord-warning

  # The `null` receiver must be a true black hole — no discordConfigs,
  # no webhookConfigs, no integrations whatsoever. A typo / paste-from-
  # warning that adds discordConfigs here would re-leak severity=none
  # alerts to a Discord channel, defeating the fix.
  - it: null receiver has no integrations (true black hole)
    asserts:
      - notExists:
          path: spec.receivers[0].discordConfigs
      - notExists:
          path: spec.receivers[0].webhookConfigs
      - notExists:
          path: spec.receivers[0].emailConfigs
