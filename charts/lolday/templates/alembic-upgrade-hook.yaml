{{- if .Values.backend.enabled }}
# Phase 7.5 — Alembic schema migration via helm pre-upgrade hook.
#
# Runs once per `helm install` / `helm upgrade`, before the backend Deployment
# rolls out. Single-pod avoids the concurrent-DDL race that init-container-per-
# replica would cause on the 2-replica Deployment.
#
# Bootstrap behavior:
#   - Fresh DB (no tables): `alembic upgrade head` creates every table from
#     the baseline revision forward.
#   - Existing DB carried over from the pre-Alembic era (phase 7.4 and earlier
#     used `Base.metadata.create_all` + manual ALTERs, so tables already
#     exist with the exact Phase 7.4 schema): before the first alembic deploy,
#     operator must run `alembic stamp head` manually — documented in
#     scripts/deploy.sh. After stamp, this hook becomes a no-op until a new
#     migration is added.
apiVersion: batch/v1
kind: Job
metadata:
  name: alembic-upgrade
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/component: alembic
    {{- include "lolday.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/component: alembic
        {{- include "lolday.labels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: alembic
          image: {{ .Values.backend.image }}
          # Schema migrations must use the freshest bits — a tag re-pushed
          # in place (e.g. `phase7.5` hotfix) would silently apply stale
          # migrations under IfNotPresent.
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          command: ["uv", "run", "alembic", "upgrade", "head"]
          env:
            # P2 H-7 + H-10 together: readOnlyRootFilesystem=true + UID 1000
            # with HOME=/home/lolday on the ro fs leaves `uv` with no writable
            # cache root. Redirect to the writable /tmp emptyDir. UV_NO_SYNC
            # tells `uv run` to skip the implicit sync that would otherwise
            # try to install dev deps (mypy etc.) into /app/.venv — also a
            # write into the read-only fs.
            - name: UV_CACHE_DIR
              value: /tmp/uv-cache
            - name: UV_NO_SYNC
              value: "1"
            # Alembic only needs DATABASE_URL. `app.config.Settings` uses a
            # default `FERNET_KEYS: list[str] = []`, so importing `app.models`
            # does NOT require the Fernet secret — the earlier env binding
            # was a mis-attribution and also caused a fresh-install crash
            # because `backend-fernet-key` (a normal template) doesn't exist
            # when the pre-install hook fires.
            #
            # DATABASE_URL is rendered inline. The password also lives in the
            # helm release Secret (same ns, same RBAC) so the hook manifest
            # doesn't add any exposure beyond what `helm get manifest` already
            # returns.
            - name: DATABASE_URL
              value: "postgresql+asyncpg://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@postgresql:5432/{{ .Values.postgresql.auth.database }}"
            {{- /* Phase 10: importing app.config triggers the Settings
                    `validate_sso_config` validator, which requires either
                    ENVIRONMENT!=production or CF_ACCESS_* to be set. The
                    Alembic Job doesn't talk to Cloudflare, so opt out via a
                    distinct environment tag. */}}
            - name: ENVIRONMENT
              value: "migration"
            {{- /* Phase 10: SSO admin rename migration reads SSO_ADMIN_EMAIL
                    from env. If it's unset the migration is a no-op — which is
                    safe (migration re-runs on next deploy once populated). */}}
            {{- with .Values.backend.env.SSO_ADMIN_EMAIL }}
            - name: SSO_ADMIN_EMAIL
              value: {{ . | quote }}
            {{- end }}
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
