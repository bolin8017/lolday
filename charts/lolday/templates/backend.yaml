{{- if .Values.backend.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: backend
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/component: backend
    {{- include "lolday.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@postgresql:5432/{{ .Values.postgresql.auth.database }}"
  REDIS_URL: "redis://:{{ required "redis.auth.password must be set" .Values.redis.auth.password }}@redis:6379/0"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/component: backend
    {{- include "lolday.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/component: backend
    spec:
      serviceAccountName: backend
      # H-7: deferred — backend talks to K8s API for job dispatch and
      # therefore needs the projected SA token. Until that code path is
      # refactored, RBAC narrow (P1 C-1) is the primary defense.
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          image: {{ .Values.backend.image }}
          ports:
            # M-internal-split: 8000 = public API (cloudflared), 8001 =
            # /api/v1/internal/* sub-app for job-pod callbacks. Network gating
            # in templates/network-policy.yaml.
            - name: api
              containerPort: 8000
            - name: internal
              containerPort: 8001
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
          envFrom:
            - secretRef:
                name: backend
          env:
            # P2 H-7 + H-10 together: readOnlyRootFilesystem=true + UID 1000
            # with HOME=/home/lolday on the ro fs leaves `uv run` (used by the
            # CMD) with no writable cache root. Redirect to the writable /tmp
            # emptyDir mount below. UV_NO_SYNC skips the implicit sync that
            # would otherwise install dev deps into the read-only /app/.venv.
            - name: UV_CACHE_DIR
              value: /tmp/uv-cache
            - name: UV_NO_SYNC
              value: "1"
            - name: FERNET_KEYS
              valueFrom:
                secretKeyRef:
                  name: backend-fernet-key
                  key: key
            - name: HARBOR_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-harbor-admin
                  key: password
            # Phase 7.4 — user-event Discord webhook URL.
            # Optional: backend tolerates empty string (notify becomes a no-op).
            - name: DISCORD_WEBHOOK_URL_EVENTS
              valueFrom:
                secretKeyRef:
                  name: discord-events
                  key: webhook-url
                  optional: true
            # Phase 1 (2026-05-05): vcjobs + build Jobs moved to the
            # dedicated jobsNamespace. The Phase 7.5 invariant — these
            # two stay in sync with the corresponding RBAC scope —
            # holds because templates/jobs-rbac.yaml grants the
            # backend SA verbs in jobsNamespace; templates/backend-rbac.yaml
            # only retains same-ns secrets/configmaps/PVC verbs.
            - name: BUILD_NAMESPACE
              value: {{ .Values.global.jobsNamespace | quote }}
            - name: JOB_NAMESPACE
              value: {{ .Values.global.jobsNamespace | quote }}
            {{- range $k, $v := .Values.backend.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: api
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: api
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/component: backend
    {{- include "lolday.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: api
      port: 8000
      targetPort: api
    - name: internal
      port: 8001
      targetPort: internal
  selector:
    app.kubernetes.io/component: backend
{{- end }}
