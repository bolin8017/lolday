{{- if .Values.backend.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/component: backend
    {{- include "lolday.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backend
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "lolday.labels" . | nindent 4 }}
rules:
  # Phase 1 (2026-05-05) — pods / batch / batch.volcano.sh moved to
  # the lolday-jobs Role (templates/jobs-rbac.yaml). Same-ns Role keeps
  # only resources that legitimately live in the infra namespace.
  - apiGroups: [""]
    resources: [secrets, configmaps]
    verbs: [get, list, create, update, delete]
  - apiGroups: [""]
    resources: [persistentvolumeclaims]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backend
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "lolday.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: backend
    namespace: {{ .Values.global.namespace }}
roleRef:
  kind: Role
  name: backend
  apiGroup: rbac.authorization.k8s.io
---
# Phase 7.5 — cluster_status.get_gpu_allocation() needs Nodes (cluster-scope).
# Pods are read via the namespaced Role above (GPU workloads only land in
# {{ .Values.global.namespace }}), so pods are NOT in this ClusterRole — that
# was the Phase 7.4 initial over-grant that exposed all-namespace topology.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.global.namespace }}-backend-cluster-reader
  labels:
    {{- include "lolday.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [nodes]
    verbs: [get, list, watch]
  # Phase 2 — per-user Volcano Queue is cluster-scoped, created lazily on
  # first POST /jobs by the same user. List + get for reconciler-side checks
  # (currently only create is used, but read verbs are cheap and avoid future
  # round-trip if we add UI showing per-user queue depth).
  - apiGroups: [scheduling.volcano.sh]
    resources: [queues]
    verbs: [get, list, create]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.global.namespace }}-backend-cluster-reader
  labels:
    {{- include "lolday.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: backend
    namespace: {{ .Values.global.namespace }}
roleRef:
  kind: ClusterRole
  name: {{ .Values.global.namespace }}-backend-cluster-reader
  apiGroup: rbac.authorization.k8s.io
{{- end }}
