{{- if .Values.backend.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/component: backend
    {{- include "lolday.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backend
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "lolday.labels" . | nindent 4 }}
rules:
  # P1 [C-1] (2026-05-12) — Phase 1's same-ns secret/configmap grant
  # removed. Backend reads its DB credential / Fernet key / Harbor pwd
  # via env mounts (Pod Spec, not runtime API). Per-job Secret creation
  # lives in lolday-jobs (templates/jobs-rbac.yaml).
  - apiGroups: [""]
    resources: [persistentvolumeclaims]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backend
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "lolday.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: backend
    namespace: {{ .Values.global.namespace }}
roleRef:
  kind: Role
  name: backend
  apiGroup: rbac.authorization.k8s.io
---
# Phase 7.5 — cluster_status.get_gpu_allocation() needs Nodes (cluster-scope).
# Pods are read via the namespaced Role above (GPU workloads only land in
# {{ .Values.global.namespace }}), so pods are NOT in this ClusterRole — that
# was the Phase 7.4 initial over-grant that exposed all-namespace topology.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.global.namespace }}-backend-cluster-reader
  labels:
    {{- include "lolday.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [nodes]
    verbs: [get, list, watch]
  # Phase 2 — per-user Volcano Queue is cluster-scoped, created lazily on
  # first POST /jobs by the same user. List + get for reconciler-side checks
  # (currently only create is used, but read verbs are cheap and avoid future
  # round-trip if we add UI showing per-user queue depth).
  - apiGroups: [scheduling.volcano.sh]
    resources: [queues]
    verbs: [get, list, create]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.global.namespace }}-backend-cluster-reader
  labels:
    {{- include "lolday.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: backend
    namespace: {{ .Values.global.namespace }}
roleRef:
  kind: ClusterRole
  name: {{ .Values.global.namespace }}-backend-cluster-reader
  apiGroup: rbac.authorization.k8s.io
{{- end }}
