{{/* H-14 follow-up (#174, 2026-05-15): dedicated namespace for the
     BuildKit seccomp installer DaemonSet.

     Why a separate namespace from `lolday` (infra) and `lolday-jobs`
     (vcjobs + build Jobs)? The seccomp installer is a privileged hostPath
     writer — it mounts /var/lib/kubelet/seccomp and copies
     files/buildkit/seccomp.json onto every node. It needs runAsUser:0 +
     CAP_CHOWN + CAP_DAC_OVERRIDE + CAP_FOWNER, AND it uses a hostPath
     volume.

     PSS level note: hostPath volumes are forbidden by `baseline` AND
     `restricted` (K8s PSS reference table — only `privileged` allows
     them). The original 0.24.0 ship used `enforce: baseline` and the
     installer DaemonSet was blocked with FailedCreate. Hotfix: set
     `enforce: privileged` here. audit + warn at `restricted` remain
     informational — they generate one PodSecurity warning per installer
     pod recreation (intentional, ignore in alert rules), and they would
     flag any future non-privileged pod that drifts into this ns.

     See docs/runbooks/pss-label-promotion.md for the lolday + lolday-jobs
     ns enforce-promotion procedure. */}}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.global.buildsNamespace }}
  labels:
    {{- include "lolday.labels" . | nindent 4 }}
    lolday.io/role: builds
    # explicit duplicate of K8s' auto-injected label, for older K3s + tooling
    # that don't reliably honour the projected `kubernetes.io/metadata.name`.
    kubernetes.io/metadata.name: {{ .Values.global.buildsNamespace }}
    # H-14 — PSS enforce at `privileged` because the buildkit-seccomp-installer
    # DaemonSet mounts a hostPath volume (`/var/lib/kubelet/seccomp`). hostPath
    # is forbidden by `baseline` AND `restricted` (only `privileged` allows it).
    # audit + warn at `restricted` keep an informational signal for any future
    # non-installer pod that drifts into this ns.
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/enforce: privileged
