{{- if .Values.cloudflare.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/component: cloudflared
    {{- include "lolday.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.cloudflare.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: cloudflared
  template:
    metadata:
      labels:
        app.kubernetes.io/component: cloudflared
    spec:
      securityContext:
        runAsNonRoot: true
        # L-cloudflared-runas: pin the UID explicitly. The upstream
        # cloudflare/cloudflared image already runs as 65532 (distroless
        # nobody convention); the explicit pin defends against an upstream
        # USER change.
        runAsUser: 65532
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: cloudflared
          image: {{ .Values.cloudflare.image | default "cloudflare/cloudflared:2026.3.0" }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities: { drop: [ALL] }
          args:
            - tunnel
            - --no-autoupdate
            # Pin metrics server to :2000 so the liveness/readiness probes below hit a known port;
            # without this cloudflared picks a random free port (observed :20241) and probes fail.
            - --metrics
            - 0.0.0.0:2000
            - run
            - --token
            - $(TUNNEL_TOKEN)
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflared-tunnel-token
                  key: tunnel-token
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /ready
              port: 2000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 2000
            initialDelaySeconds: 5
            periodSeconds: 10
{{- end }}
