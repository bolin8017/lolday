{{- if .Values.cloudflare.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: cloudflared-tunnel-token
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "lolday.labels" . | nindent 4 }}
type: Opaque
stringData:
  tunnel-token: {{ required "cloudflare.tunnelToken must be set when cloudflare.enabled=true (pass via --set cloudflare.tunnelToken=$CF_TUNNEL_TOKEN)" .Values.cloudflare.tunnelToken | quote }}
{{- end }}
