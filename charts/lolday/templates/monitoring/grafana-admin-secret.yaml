{{- if .Values.monitoring.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin
  # Grafana subchart (under kps) deploys to release namespace, not monitoring.
  # Keep the admin secret alongside it so existingSecret lookup succeeds.
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lolday.labels" . | nindent 4 }}
type: Opaque
stringData:
  admin-user: admin
  admin-password: {{ required "monitoring.grafana.adminPassword must be set (via --set or values)" .Values.monitoring.grafana.adminPassword | quote }}
{{- end }}
