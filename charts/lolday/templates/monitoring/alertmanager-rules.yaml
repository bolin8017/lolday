{{- if .Values.monitoring.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: lolday-baseline
  namespace: {{ .Values.monitoring.namespace }}
  labels:
    app: kube-prometheus-stack
    release: {{ .Release.Name }}
    {{- include "lolday.labels" . | nindent 4 }}
spec:
  groups:
    - name: lolday-baseline.rules
      interval: 30s
      rules:
        - alert: NodeDiskAlmostFull
          expr: |
            (node_filesystem_size_bytes{mountpoint=~"/|/mnt/ssd500g"}
             - node_filesystem_avail_bytes{mountpoint=~"/|/mnt/ssd500g"})
             / node_filesystem_size_bytes{mountpoint=~"/|/mnt/ssd500g"} > 0.85
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "Node disk > 85% on {{`{{ $labels.instance }}`}} ({{`{{ $labels.mountpoint }}`}})"
            description: "Filesystem {{`{{ $labels.mountpoint }}`}} on {{`{{ $labels.instance }}`}} is above 85% used for 10m."

        - alert: DCGMXIDError
          expr: DCGM_FI_DEV_XID_ERRORS > 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "GPU {{`{{ $labels.gpu }}`}} on {{`{{ $labels.Hostname }}`}} reported NVIDIA XID error"
            description: "DCGM reported a non-zero XID error code on GPU {{`{{ $labels.gpu }}`}} ({{`{{ $labels.Hostname }}`}}). XID codes indicate driver-level faults (memory error, MMU fault, falling off the bus, etc.). See https://docs.nvidia.com/deploy/xid-errors/ to interpret the code; some are transient (kernel preempt) but most indicate hardware degradation. Investigate `dcgmi diag` output before lolday job submissions resume."

        - alert: PodCrashLoopBackOff
          expr: kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"} == 1
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}} is CrashLoopBackOff"
            description: "Container {{`{{ $labels.container }}`}} in pod {{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}} has been CrashLoopBackOff for 15m."

        - alert: LoldayCoreServiceDown
          expr: up{job=~"backend|postgres-exporter|harbor"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Core service {{`{{ $labels.job }}`}} is down"
            description: "Prometheus has not been able to scrape {{`{{ $labels.job }}`}} for 2m."

        - alert: LoldayBackendErrorRateElevated
          expr: rate(lolday_backend_errors_total[5m]) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Backend errors in stage {{`{{ $labels.stage }}`}}"
            description: "lolday_backend_errors_total rate > 0 in stage '{{`{{ $labels.stage }}`}}' for 5m. This catches silent-failure paths (e.g. reconciler loop exceptions, Harbor init failures, best-effort K8s/MLflow cleanup failures). Check backend logs for the matching `logger.exception` entry."

        # Phase 9.2 — Alloy's loki.write has a disk-backed WAL, but if Loki
        # is unavailable long enough for the WAL's bounded segments to age
        # out, samples get dropped silently. Scrape target is the alloy
        # service; alert on the operator-facing gauge.
        - alert: AlloyLokiWriteDroppedSamples
          expr: increase(loki_write_dropped_samples_total[10m]) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Alloy dropped log samples on the way to Loki"
            description: "Alloy's loki.write component has dropped at least one sample in the last 10m. Check Loki availability (`kubectl -n lolday get pods -l app.kubernetes.io/name=loki`), loki.write WAL segment age, and Alloy's own `/metrics` endpoint for the full breakdown (`loki_write_errors_total`, `loki_write_bytes_total`). During Phase 9 Loki single-binary deploys, any full Loki restart is enough to trigger this."

        # Phase 7.5 — backend piggybacks on get_queue_depth (updated every 10s)
        # to sample the age of Pending Volcano Jobs. Catches scheduler hangs,
        # webhook races, or orphan CRs without masking them with an autocronjob.
        - alert: VolcanoJobsStuckPending
          expr: lolday_volcano_pending_stale > 5
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "{{`{{ $value }}`}} Volcano Jobs pending > 30min"
            description: "More than 5 batch.volcano.sh/v1alpha1 Jobs have been in Pending phase for > 30min. Check `kubectl -n lolday get jobs.batch.volcano.sh --field-selector=status.state.phase=Pending`. Typical causes: Volcano scheduler crash/restart loop, admission webhook misconfigured, or orphan CRs from a runaway script. If orphans, delete with the selector above."

    - name: lolday-resource-pressure.rules
      interval: 30s
      rules:
        # Phase 4 — kubelet eviction signal. Phase 0 added eviction-soft
        # memory.available<2Gi (grace 2m); when that fires, kubelet
        # marks the Node MemoryPressure=true. This alert reflects that
        # *as it is happening* — at this point pods are getting evicted.
        - alert: LoldayNodeMemoryPressure
          expr: kube_node_status_condition{condition="MemoryPressure",status="true"} == 1
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "{{`{{ $labels.node }}`}} entered MemoryPressure — kubelet evicting pods"
            description: "Node {{`{{ $labels.node }}`}} crossed eviction-soft memory.available<2Gi for >1m. kubelet is evicting BestEffort/Burstable pods. Investigate biggest offenders: `kubectl top pods -A --sort-by=memory`. See spec §5.1."

        - alert: LoldayNodeDiskPressure
          expr: kube_node_status_condition{condition="DiskPressure",status="true"} == 1
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "{{`{{ $labels.node }}`}} entered DiskPressure — kubelet evicting pods"
            description: "Node {{`{{ $labels.node }}`}} fell below eviction-hard nodefs/imagefs<10%. kubelet is evicting pods. Free disk: prune Harbor old tags, prune old Prometheus TSDB blocks, or `docker system prune` on root LV. See spec §5.5."

        - alert: DCGMThrottleReasonsPersistent
          expr: DCGM_FI_DEV_CLOCKS_THROTTLE_REASON_HW_THERMAL_SLOWDOWN > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "GPU {{`{{ $labels.gpu }}`}} on {{`{{ $labels.Hostname }}`}} sustained HW thermal throttle for 10m"
            description: "DCGM reports the GPU has been in hardware thermal slowdown for 10 minutes — sustained throttle indicates either an inadequate cooling solution or a thermal event in progress. Distinct from a brief temperature spike during normal training (which we deliberately do NOT alert on; spec §4.1). Investigate fan / chassis airflow / ambient temperature."

        - alert: GpuSignalFailSafeStuck
          expr: lolday_gpu_signal_fail_safe_active == 1
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "lolday gpu_signal in fail-safe for 30m — scheduler not dispatching"
            description: "The host-aware GPU signal (議題 A) has been in fail-safe (Prometheus unreachable from backend) for 30 minutes. The FIFO scheduler is fail-closed: new jobs queued but not dispatched. Check `kubectl -n monitoring get pods -l app.kubernetes.io/name=prometheus` and the backend → kps-prometheus.monitoring.svc network path. Spec: docs/superpowers/specs/2026-05-10-host-aware-gpu-signal-design.md §7."

        - alert: GpuSignalCountMismatch
          expr: increase(lolday_backend_errors_total{stage="gpu_signal_count_mismatch"}[10m]) > 0
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "DCGM reports gpu_id outside CLUSTER_PHYSICAL_GPU_COUNT — env var stale?"
            description: "Backend gpu_signal saw a DCGM sample with a gpu label beyond `CLUSTER_PHYSICAL_GPU_COUNT`. Hardware was likely upgraded without bumping the env var; lolday is silently dropping the extra GPU(s). Action: bump `CLUSTER_PHYSICAL_GPU_COUNT` in chart values + redeploy."

        # Phase 4 — quota saturation. The `lolday-jobs-quota` from Phase 1
        # caps total cluster usage of the workload ns; once it's near full,
        # new submissions get HTTP 429 (or vcjob admission rejection).
        - alert: LoldayJobsQuotaMemoryNearLimit
          expr: |
            sum(kube_resourcequota{namespace="lolday-jobs",resource="requests.memory",type="used"})
            /
            sum(kube_resourcequota{namespace="lolday-jobs",resource="requests.memory",type="hard"})
            > 0.85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "lolday-jobs ResourceQuota requests.memory > 85%"
            description: "lolday-jobs has used {{`{{ $value | humanizePercentage }}`}} of its requests.memory quota for >5m. New submissions risk admission rejection. Investigate: `kubectl describe quota -n lolday-jobs`. See spec §7 Phase 1."

        - alert: LoldayJobsQuotaCPUNearLimit
          expr: |
            sum(kube_resourcequota{namespace="lolday-jobs",resource="requests.cpu",type="used"})
            /
            sum(kube_resourcequota{namespace="lolday-jobs",resource="requests.cpu",type="hard"})
            > 0.85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "lolday-jobs ResourceQuota requests.cpu > 85%"
            description: "lolday-jobs has used {{`{{ $value | humanizePercentage }}`}} of its requests.cpu quota for >5m. Investigate: `kubectl describe quota -n lolday-jobs`."

        # Phase 4 — workload backlog. Distinct from VolcanoJobsStuckPending
        # (which fires when a single job is Pending > 30min); this one fires
        # when the *backlog* is large enough to be a UX problem regardless
        # of any one job's age.
        - alert: LoldayPendingJobsHigh
          expr: lolday_jobs_pending_total > 12
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "{{`{{ $value }}`}} non-terminal vcjobs in queue (>12 for 10m)"
            description: "More than 12 vcjobs are pending or running for >10m. Quota count/jobs.batch.volcano.sh hard cap is 20; we're approaching saturation. Likely cause: GPU-heavy workload contention. Spec §6.3 covers per-user fair-share (Phase 2)."

    - name: lolday-trivy.rules
      interval: 60s
      rules:
        # Phase 7.2 — Trivy Operator scans all workloads cluster-wide and
        # publishes per-image CVE counts via the `trivy_image_vulnerabilities`
        # metric, labeled by severity (Critical / High / Medium / Low / Unknown).
        # Alert on any Critical finding; High/Medium/etc. stay on the
        # trivy-security dashboard only (per Phase 7.2 design Q1=B).
        - alert: TrivyCriticalCVE
          expr: sum(trivy_image_vulnerabilities{severity="Critical"}) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "{{`{{ $value }}`}} CRITICAL CVE(s) detected across cluster images"
            description: "Severity demoted from critical to warning per spec 2026-05-10-alerting-redesign-design (§5.6). Trivy Operator reports at least one image with a CRITICAL-severity vulnerability. List affected images with `kubectl get vulnerabilityreport -A`; each report's `.report.vulnerabilities[]` has CVE IDs and fix versions. Typical remediation: bump base image tag or upgrade the vulnerable dependency and re-build via the Phase 3 pipeline."
{{- end }}
