{{- if and .Values.monitoring.enabled .Values.monitoring.postgresExporter.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-exporter-init
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "lolday.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres-exporter-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: postgres:16-alpine
          env:
            - name: PGHOST
              value: postgresql.{{ .Values.global.namespace }}.svc
            - name: PGUSER
              value: {{ .Values.postgresql.auth.username | quote }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql
                  key: POSTGRES_PASSWORD
            # EXPORTER_PW comes from the postgres-exporter-db Secret's `password`
            # key — NOT inlined in this Job manifest (anyone with RBAC on jobs
            # could otherwise read the plaintext password from the Job spec).
            - name: EXPORTER_PW
              valueFrom:
                secretKeyRef:
                  name: postgres-exporter-db
                  key: password
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              psql -v ON_ERROR_STOP=1 -d postgres <<SQL
              DO \$\$
              BEGIN
                IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'postgres_exporter') THEN
                  CREATE USER postgres_exporter WITH PASSWORD '${EXPORTER_PW}';
                ELSE
                  ALTER USER postgres_exporter WITH PASSWORD '${EXPORTER_PW}';
                END IF;
              END
              \$\$;
              GRANT pg_monitor TO postgres_exporter;
              SQL
{{- end }}
