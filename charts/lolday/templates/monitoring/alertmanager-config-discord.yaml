{{- if .Values.monitoring.enabled }}
# Phase 7.1 — Discord receivers via AlertmanagerConfig CRD.
#
# Picked up by Alertmanager through `alertmanagerConfigSelector.matchLabels` +
# `alertmanagerConfigNamespaceSelector` in values.yaml under kps.alertmanager.alertmanagerSpec.
# Webhook URLs are NOT stored in this CR — they live only in the Secret
# `alertmanager-discord` (created by scripts/deploy.sh from DISCORD_WEBHOOK_URL_*
# env vars in ~/.lolday-secrets.env), referenced below via apiURL.name / apiURL.key.
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: discord-receivers
  namespace: {{ .Values.monitoring.namespace }}
  labels:
    lolday-alertmanager-config: discord
    {{- include "lolday.labels" . | nindent 4 }}
spec:
  route:
    receiver: discord-warning
    groupBy: [alertname, severity]
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 24h
    routes:
      - receiver: discord-critical
        matchers:
          - name: severity
            value: critical
            matchType: "="
        repeatInterval: 4h
      - receiver: discord-warning
        matchers:
          - name: severity
            value: warning
            matchType: "="
        repeatInterval: 24h
  inhibitRules:
    - sourceMatch:
        - { name: alertname, value: LoldayCoreServiceDown, matchType: "=" }
        - { name: job, value: backend, matchType: "=" }
      targetMatch:
        - { name: alertname, value: LoldayBackendErrorRateElevated, matchType: "=" }
      equal: []
    - sourceMatch:
        - { name: alertname, value: LoldayCoreServiceDown, matchType: "=" }
      targetMatch:
        - { name: alertname, value: VolcanoJobsStuckPending, matchType: "=" }
      equal: []
    - sourceMatch:
        - { name: alertname, value: LoldayNodeMemoryPressure, matchType: "=" }
      targetMatch:
        - { name: alertname, value: PodCrashLoopBackOff, matchType: "=" }
      equal: []
    - sourceMatch:
        - { name: alertname, value: LoldayNodeDiskPressure, matchType: "=" }
      targetMatch:
        - { name: alertname, value: PodCrashLoopBackOff, matchType: "=" }
      equal: []
    - sourceMatch:
        - { name: alertname, value: DCGMXIDError, matchType: "=" }
      targetMatch:
        - { name: alertname, value: DCGMThrottleReasonsPersistent, matchType: "=" }
      equal: []
  receivers:
    - name: discord-critical
      discordConfigs:
        - apiURL:
            name: alertmanager-discord
            key: webhook-url-critical
          sendResolved: true
          title: '🚨 [CRITICAL] {{`{{ .GroupLabels.alertname }}`}}'
          message: '{{`{{ template "discord.default.message" . }}`}}'
          # @here triggers a Discord channel mention push (requires Alertmanager v0.28+).
          content: '@here'
    - name: discord-warning
      discordConfigs:
        - apiURL:
            name: alertmanager-discord
            key: webhook-url-warning
          sendResolved: true
          title: '⚠️ [WARNING] {{`{{ .GroupLabels.alertname }}`}}'
          message: '{{`{{ template "discord.default.message" . }}`}}'
{{- end }}
