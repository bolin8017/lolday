{{- if .Values.monitoring.enabled }}
# Phase 7.1 — Discord receivers via AlertmanagerConfig CRD.
#
# Picked up by Alertmanager through `alertmanagerConfigSelector.matchLabels` +
# `alertmanagerConfigNamespaceSelector` in values.yaml under kps.alertmanager.alertmanagerSpec.
# Webhook URLs are NOT stored in this CR — they live only in the Secret
# `alertmanager-discord` (created by scripts/deploy.sh from DISCORD_WEBHOOK_URL_*
# env vars in ~/.lolday-secrets.env), referenced below via apiURL.name / apiURL.key.
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: discord-receivers
  namespace: {{ .Values.monitoring.namespace }}
  labels:
    lolday-alertmanager-config: discord
    {{- include "lolday.labels" . | nindent 4 }}
spec:
  route:
    # Catch-all default receiver: `discord-warning`. Any future alert
    # rule that ships without an explicit `severity` label (or with a
    # severity not matched by the routes below) will still surface to
    # Spidey Warnings rather than disappear silently — fail-loud is
    # safer than fail-silent for the alerting chain.
    receiver: discord-warning
    groupBy: [alertname, severity]
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 24h
    routes:
      # severity=none (kps convention for "informational, do not page")
      # is black-holed via the `null` receiver. This covers the
      # always-firing `Watchdog` (used in-cluster as a Prom → AM
      # liveness probe by the deadmans-switch CronJob) and the
      # `InfoInhibitor` meta-alert (kps `general.rules`, only useful as
      # an inhibition source — never as an operator notification).
      # Without this rule both leak to the catch-all `discord-warning`
      # and pop up in Spidey Warnings as `[WARNING] Watchdog` /
      # `[WARNING] InfoInhibitor` — a rendering bug because the Discord
      # receiver template hard-codes the title prefix.
      - receiver: 'null'
        matchers:
          - name: severity
            value: none
            matchType: "="
      # severity=info — kps default rules with this label (7 currently
      # loaded: CPUThrottlingHigh, KubeQuotaAlmostFull, KubeQuotaFullyUsed,
      # KubeNodeEviction, KubeNodePressure, KubeletTooManyPods,
      # NodeCPUHighUsage) are non-actionable in lolday's context.
      # KubeNodePressure / KubeNodeEviction overlap our explicit
      # severity=critical rules LoldayNodeMemoryPressure / LoldayNodeDiskPressure;
      # KubeQuotaAlmostFull / KubeQuotaFullyUsed overlap our
      # LoldayJobsQuotaMemoryNearLimit / LoldayJobsQuotaCPUNearLimit
      # (both warning at 85%); CPUThrottlingHigh / NodeCPUHighUsage are
      # telemetry visible in Grafana, not paging-grade. Without this
      # null route they fall through to discord-warning and surface in
      # Spidey Warnings as `[WARNING] CPUThrottlingHigh` etc. — same
      # rendering bug PR #206 closed for severity=none. Design:
      # docs/superpowers/specs/2026-05-17-discord-notification-audit-design.md §5.1.
      - receiver: 'null'
        matchers:
          - name: severity
            value: info
            matchType: "="
      - receiver: discord-critical
        matchers:
          - name: severity
            value: critical
            matchType: "="
        repeatInterval: 4h
      - receiver: discord-warning
        matchers:
          - name: severity
            value: warning
            matchType: "="
        repeatInterval: 24h
  inhibitRules:
    - sourceMatch:
        - { name: alertname, value: LoldayCoreServiceDown, matchType: "=" }
        - { name: job, value: backend, matchType: "=" }
      targetMatch:
        - { name: alertname, value: LoldayBackendErrorRateElevated, matchType: "=" }
      equal: []
    - sourceMatch:
        - { name: alertname, value: LoldayCoreServiceDown, matchType: "=" }
      targetMatch:
        - { name: alertname, value: VolcanoJobsStuckPending, matchType: "=" }
      equal: []
    - sourceMatch:
        - { name: alertname, value: LoldayNodeMemoryPressure, matchType: "=" }
      targetMatch:
        - { name: alertname, value: PodCrashLoopBackOff, matchType: "=" }
      equal: []
    - sourceMatch:
        - { name: alertname, value: LoldayNodeDiskPressure, matchType: "=" }
      targetMatch:
        - { name: alertname, value: PodCrashLoopBackOff, matchType: "=" }
      equal: []
    - sourceMatch:
        - { name: alertname, value: DCGMXIDError, matchType: "=" }
      targetMatch:
        - { name: alertname, value: DCGMThrottleReasonsPersistent, matchType: "=" }
      equal: []
    # 2026-05-17 audit follow-up — kps cause/effect suppression. Each
    # new rule pairs a lolday-baseline source (critical-grade, more
    # context-aware PromQL) with a kube-prometheus-stack default that
    # is its mechanical duplicate, so the operator sees ONE @here or
    # [WARNING] embed per incident instead of two for the same root
    # cause. Design:
    # docs/superpowers/specs/2026-05-17-discord-notification-audit-design.md
    # §10 (item 3: "Inhibition expansion").
    #
    # LoldayCoreServiceDown fires on `up{job=~"backend|postgres-exporter|harbor"} == 0`;
    # kps `TargetDown` fires on the same `up == 0` series when ≥10% of a
    # job's targets are down. Identical root cause; inhibit kps when ours
    # fires. `equal: [job]` keeps the inhibition job-scoped — a backend
    # outage does NOT suppress a TargetDown on (e.g.) kube-state-metrics.
    - sourceMatch:
        - { name: alertname, value: LoldayCoreServiceDown, matchType: "=" }
      targetMatch:
        - { name: alertname, value: TargetDown, matchType: "=" }
      equal: [job]
    # Lolday-level node-pressure alerts (critical) cover the same
    # condition as the kps node-exporter warnings (which fire on
    # telemetry thresholds rather than kubelet's eviction-soft signal).
    # Single-node lolday → `equal: []` is acceptable; a multi-node
    # future would need `equal: [instance]` once the rule sources
    # expose `instance`.
    - sourceMatch:
        - { name: alertname, value: LoldayNodeMemoryPressure, matchType: "=" }
      targetMatch:
        - { name: alertname, value: NodeMemoryHighUtilization, matchType: "=" }
      equal: []
    # Disk-fullness consolidation: regex source ∪ regex target compacts
    # 4 inhibitions into 1.
    #   source ∈ {NodeDiskAlmostFull, LoldayNodeDiskPressure} (both critical)
    #   target ∈ {NodeFilesystemSpaceFillingUp, NodeFilesystemAlmostOutOfSpace}
    # When either lolday source fires, both kps filesystem warnings are
    # suppressed (the kubelet DiskPressure trigger and 85% fill cover
    # essentially the same observation as the kps thresholds).
    - sourceMatch:
        - { name: alertname, value: "NodeDiskAlmostFull|LoldayNodeDiskPressure", matchType: "=~" }
      targetMatch:
        - { name: alertname, value: "NodeFilesystemSpaceFillingUp|NodeFilesystemAlmostOutOfSpace", matchType: "=~" }
      equal: []
    # Lolday-level node-pressure inhibits kps generic
    # `KubePodCrashLooping` (the kps-name twin of the existing rules 3+4
    # which inhibit our `PodCrashLoopBackOff`). Same condition, two
    # alertnames; both should suppress under node pressure.
    - sourceMatch:
        - { name: alertname, value: "LoldayNodeMemoryPressure|LoldayNodeDiskPressure", matchType: "=~" }
      targetMatch:
        - { name: alertname, value: KubePodCrashLooping, matchType: "=" }
      equal: []
  receivers:
    # Black-hole receiver — see the `severity=none` route block above.
    # Declared with no integrations (no discordConfigs / webhookConfigs)
    # so Alertmanager silently drops messages routed here. Removing
    # this receiver would resurface the [WARNING] Watchdog / [WARNING]
    # InfoInhibitor leak in Spidey Warnings.
    - name: 'null'
    - name: discord-critical
      discordConfigs:
        - apiURL:
            name: alertmanager-discord
            key: webhook-url-critical
          sendResolved: true
          title: '🚨 [CRITICAL] {{`{{ .GroupLabels.alertname }}`}}'
          message: '{{`{{ template "discord.default.message" . }}`}}'
          # @here triggers a Discord channel mention push (requires Alertmanager v0.28+).
          content: '@here'
    - name: discord-warning
      discordConfigs:
        - apiURL:
            name: alertmanager-discord
            key: webhook-url-warning
          sendResolved: true
          title: '⚠️ [WARNING] {{`{{ .GroupLabels.alertname }}`}}'
          message: '{{`{{ template "discord.default.message" . }}`}}'
{{- end }}
