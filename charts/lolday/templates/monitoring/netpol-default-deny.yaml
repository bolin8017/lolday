{{- if .Values.monitoring.enabled }}
{{/* Close #168 (CIS 5.3.2): the monitoring namespace held no
     NetworkPolicy and accepted any pod-to-pod traffic. This file adds a
     ns-wide default-deny plus the minimum allows for Prometheus to scrape
     siblings (kube-prometheus-stack internals) and reach scrape targets
     in lolday / lolday-jobs / kube-system.

     Out-of-scope on purpose:
     - Cross-ns ingress from lolday ns into monitoring is NOT needed.
       Backend reads Prometheus via the in-cluster `kps-prometheus.monitoring.svc`
       Service — that traffic is monitoring-ns egress, not ingress.
     - Alertmanager → Discord webhook egress reuses the same "external 0.0.0.0/0
       except RFC1918" carve-out we already use for cloudflared egress and the
       build/job egress NPs. Discord webhook IPs are not stable. Mainstream
       guidance (Cloudflare, GitHub, Discord support docs) is to allow the
       public CDN range and rely on TLS + receiver auth.

     SSH-safety: this is a NetworkPolicy, not an iptables rewrite. K3s'
     kube-router NP controller adds chain rules without touching host SSH. */}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: monitoring-default-deny
  namespace: {{ .Values.monitoring.namespace }}
  labels:
    {{- include "lolday.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  # No `ingress:` / `egress:` block — deny everything by default.
  # Allow rules below add back what each component legitimately needs.
---
# Same-ns ingress allow: Prometheus scrapes Alertmanager / Grafana /
# kube-state-metrics / node-exporter / kps internals, Grafana queries
# Prometheus, etc. A single intra-ns allow covers all of it.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: monitoring-internal-ingress
  namespace: {{ .Values.monitoring.namespace }}
  labels:
    {{- include "lolday.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.monitoring.namespace }}
---
# Cross-ns ingress: allow Traefik (kube-system) to reach Grafana / Prometheus
# UI through the chart's Ingress objects. Backend → Prometheus query also
# routes via Traefik on the public host, so this allow doubles for that.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: monitoring-traefik-ingress
  namespace: {{ .Values.monitoring.namespace }}
  labels:
    {{- include "lolday.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
---
# Egress for the monitoring ns. Allow:
#   - DNS (CoreDNS)
#   - Same-namespace egress (Prom → AM, Grafana → Prom, deadmans-switch → AM).
#     Pods inside the same ns are NOT auto-allowed; selecting `podSelector: {}`
#     on the deny rule covers them, so a same-ns allow is required.
#   - Cross-ns scrape egress to the workload namespaces (lolday, lolday-jobs,
#     kube-system, trivy-system, gpu-operator). namespaceSelector matches
#     pod-network targets only.
#   - Host-network egress to kubelet on TCP 10250. Kubelet runs on the K3s
#     node's host network and has no pod label, so namespaceSelector(kube-system)
#     can NOT match it. Use an ipBlock with the K3s pod+service CIDR carve-out.
#   - External egress to 0.0.0.0/0 on 443 (Alertmanager → Discord webhook) and
#     6443 (kube-apiserver reachable via the node IP after kube-proxy DNAT).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: monitoring-default-egress
  namespace: {{ .Values.monitoring.namespace }}
  labels:
    {{- include "lolday.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
    # Same-namespace egress (Prom → AM, Grafana → Prom, deadmans-switch → AM,
    # AM → AM cluster gossip on :9094 if HA, etc.).
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.monitoring.namespace }}
    # Cross-ns scrape targets in lolday infra ns (backend :8000, postgres
    # exporter :9187, mlflow :5000, harbor exporter :8001 etc.). We allow
    # the ns broadly because Prometheus discovers targets at runtime; the
    # ingress side of each target restricts further (see e.g.
    # netpol-lolday-default-deny.yaml).
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.global.namespace }}
    # Cross-ns scrape targets in lolday-jobs ns (vcjob pods that expose
    # metrics — currently none, but reserved for future detector metrics).
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.global.jobsNamespace }}
    # kube-system: kube-state-metrics + kube-apiserver via Service IP +
    # CoreDNS metrics + Traefik metrics. Pod-network targets only (kubelet
    # is host-network and is covered by the ipBlock rule below).
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
    # trivy-system: VulnerabilityReport metrics endpoint.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: trivy-system
    # gpu-operator: DCGM exporter metrics.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: gpu-operator
    # Kubelet metrics on the K3s node's host network. The kube-system
    # namespaceSelector above cannot match host-network targets (kubelet has
    # no pod label), so we open TCP 10250 via ipBlock with the pod+service
    # CIDR carve-out. Mainstream kube-prometheus-stack pattern; see
    # https://github.com/prometheus-community/helm-charts/blob/main/charts/kube-prometheus-stack/values.yaml
    # `prometheus.networkPolicy.egress` for the upstream equivalent.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 10.42.0.0/16  # K3s pod CIDR
              - 10.43.0.0/16  # K3s service CIDR
              - 192.168.0.0/16
              - 172.16.0.0/12
              - 169.254.0.0/16
      ports:
        - { protocol: TCP, port: 10250 }
    # External egress for Alertmanager Discord webhook. Discord IPs aren't
    # stable; the carve-out matches the pattern in build-networkpolicy.yaml
    # and netpol-cloudflared.yaml. TLS + receiver auth gate the receiver
    # side; this rule only opens the network path.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 10.42.0.0/16
              - 10.43.0.0/16
              - 192.168.0.0/16
              - 172.16.0.0/12
              - 169.254.0.0/16
      ports:
        - { protocol: TCP, port: 443 }
        - { protocol: TCP, port: 6443 } # kube-apiserver via host LB
---
# Cross-ns ingress: allow backend pods in `lolday` ns to query Prometheus
# (kps-prometheus.monitoring.svc:9090). The 2026-05-11 host-aware GPU
# signal design (docs/superpowers/specs/2026-05-10-host-aware-gpu-signal-design.md
# §7) made this a fail-closed runtime path — without ingress the scheduler
# pages GpuSignalFailSafeStuck. Backend does NOT need Alertmanager API
# access, so port 9090 only.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: prometheus-from-lolday-backend
  namespace: {{ .Values.monitoring.namespace }}
  labels:
    {{- include "lolday.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.global.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/component: backend
      ports:
        - { protocol: TCP, port: 9090 }
{{- end }}
