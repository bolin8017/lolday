{{- if and .Values.volcano.enabled .Values.monitoring.enabled }}
# Phase 7.3 — scrape the Volcano scheduler's metrics endpoint so we get job-
# queueing signals (queue depth, scheduling latency) in Prometheus. The
# Volcano subchart (1.14.1) hard-codes `{{ "{{" }} .Release.Namespace {{ "}}" }}` across all
# its templates — no namespaceOverride option — so its Service lands in the
# release ns (`lolday`) with name `<release>-scheduler-service` and label
# `app: volcano-scheduler` (plain `app`, not the app.kubernetes.io/component
# convention). Cross-ns select from monitoring — same pattern as Phase 7.1.1
# DCGM / Phase 7.2 Trivy SMs.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: volcano-scheduler
  namespace: {{ .Values.monitoring.namespace }}
  labels:
    {{- include "lolday.labels" . | nindent 4 }}
spec:
  namespaceSelector:
    matchNames: [{{ .Values.global.namespace }}]
  selector:
    matchLabels:
      app: volcano-scheduler
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
{{- end }}
