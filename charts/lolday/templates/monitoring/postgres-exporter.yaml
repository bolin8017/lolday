{{- if and .Values.monitoring.enabled .Values.monitoring.postgresExporter.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-exporter-db
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "lolday.labels" . | nindent 4 }}
type: Opaque
stringData:
  # M-pg-exporter: the postgres_exporter binary accepts EITHER
  #   DATA_SOURCE_NAME=<full DSN with embedded password>
  # OR the split form:
  #   DATA_SOURCE_USER + DATA_SOURCE_PASS + DATA_SOURCE_URI (host:port/db?sslmode=disable)
  # The split form keeps the password in its own key so a future
  # mount-as-files refactor can ship USER + URI to ConfigMap and leave
  # PASS as the only Secret field. Sslmode=disable is tracked under
  # docs/superpowers/specs/2026-05-12-security-hardening-design.md §9.
  DATA_SOURCE_USER: "postgres_exporter"
  DATA_SOURCE_PASS: {{ required "monitoring.postgresExporter.password must be set" .Values.monitoring.postgresExporter.password | quote }}
  DATA_SOURCE_URI: "postgresql.{{ .Values.global.namespace }}.svc:5432/{{ .Values.postgresql.auth.database }}?sslmode=disable"
  # ``password`` key preserved for postgres-exporter-initjob's secretKeyRef
  # — the init Job binds ``PGPASSWORD`` from this specific key, not from envFrom.
  password: {{ required "monitoring.postgresExporter.password must be set" .Values.monitoring.postgresExporter.password | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "lolday.labels" . | nindent 4 }}
    app.kubernetes.io/name: postgres-exporter
    app.kubernetes.io/component: postgres-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres-exporter
        app.kubernetes.io/component: postgres-exporter
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: exporter
          image: {{ .Values.monitoring.postgresExporter.image | quote }}
          args:
            - "--web.listen-address=:9187"
            - "--collector.database"
            - "--collector.stat_activity_autovacuum"
          envFrom:
            - secretRef:
                name: postgres-exporter-db
          ports:
            - name: metrics
              containerPort: 9187
          readinessProbe:
            httpGet: { path: /, port: metrics }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: metrics }
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            {{- toYaml .Values.monitoring.postgresExporter.resources | nindent 12 }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities: { drop: [ALL] }
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "lolday.labels" . | nindent 4 }}
    app.kubernetes.io/name: postgres-exporter
spec:
  selector:
    app.kubernetes.io/name: postgres-exporter
  ports:
    - name: metrics
      port: 9187
      targetPort: metrics
      protocol: TCP
{{- end }}
