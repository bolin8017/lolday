apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: lolday
  namespace: {{ .Release.Namespace }}
spec:
  entryPoints: [web]
  routes:
    # Backend API — path prefix must come first so it wins over the catch-all
    - kind: Rule
      match: Host(`{{ .Values.frontend.host }}`) && PathPrefix(`/api/v1`)
      priority: 10
      services:
        - kind: Service
          name: backend
          port: 8000
    # MLflow UI — exposed at /mlflow/ behind the host's Cloudflare Access policy.
    # Pass-through (no stripPrefix): MLflow's `--static-prefix=/mlflow` makes
    # mlflow itself serve the UI at /mlflow/ and ajax-api at
    # /mlflow/ajax-api/, so Traefik must forward the path unchanged. Stripping
    # /mlflow would land at mlflow's `/`, which 404s under static-prefix.
    #
    # H-15 (security-hardening-p2): the per-request ForwardAuth middleware
    # ``mlflow-forward-auth`` calls the backend's
    # ``POST /api/v1/mlflow-authz`` endpoint and authorises each call via
    # CF Access JWT (browser) or job bearer token (sidecar). The MLflow
    # Service is locked down by the T9 NetworkPolicy to backend + Traefik
    # only, so this is the only path that can reach MLflow.
    - kind: Rule
      match: Host(`{{ .Values.frontend.host }}`) && PathPrefix(`/mlflow`)
      priority: 6
      middlewares:
        - name: mlflow-forward-auth
      services:
        - kind: Service
          name: mlflow
          port: {{ .Values.mlflow.service.port }}

    # Frontend catch-all
    - kind: Rule
      match: Host(`{{ .Values.frontend.host }}`)
      priority: 1
      services:
        - kind: Service
          name: frontend
          port: 80
