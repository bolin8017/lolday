{{- if .Values.buildkit.seccompProfile.enabled }}
# H-11 (P2): drop the BuildKit-rootless seccomp profile onto every node's
# kubelet directory so the build Job pods can reference it via
#   seccompProfile: { type: Localhost, localhostProfile: profiles/buildkit-rootless.json }
# Kubernetes requires custom seccomp profiles to live at
# /var/lib/kubelet/seccomp/profiles/<name>.json on the kubelet host; K3s on
# server30 does not ship them, so this DaemonSet populates the directory
# from a ConfigMap rendered from files/buildkit/seccomp.json.
#
# Profile origin: moby/moby v28.0.0 profiles/seccomp/default.json — the
# Docker Engine default seccomp profile. BuildKit-rootless documentation
# (moby/buildkit docs/rootless.md) directs deployers to use the Docker
# default, which whitelists user-namespace syscalls (setuid/setgid/
# clone/unshare) that BuildKit's rootlesskit needs. This replaces
# the previous `seccompProfile: Unconfined` (maximum permissions) with
# a narrowly-scoped allowlist.
apiVersion: v1
kind: ConfigMap
metadata:
  name: buildkit-seccomp-profile
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "lolday.labels" . | nindent 4 }}
data:
  seccomp.json: |-
{{ .Files.Get "files/buildkit/seccomp.json" | indent 4 }}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: buildkit-seccomp-installer
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "lolday.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: buildkit-seccomp-installer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: buildkit-seccomp-installer
    spec:
      # Privileged hostPath write — required to populate kubelet's seccomp dir.
      # Runs once per node, then sleeps to keep the DaemonSet pod in Running.
      containers:
        - name: installer
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -e
              mkdir -p /host-seccomp/profiles
              cp /config/seccomp.json /host-seccomp/profiles/buildkit-rootless.json
              chmod 644 /host-seccomp/profiles/buildkit-rootless.json
              sleep infinity
          volumeMounts:
            - name: config
              mountPath: /config
            - name: host-seccomp
              mountPath: /host-seccomp
          securityContext:
            # hostPath write to /var/lib/kubelet requires root.
            # Compensating control: scope is limited to a single file write,
            # then sleep. Container has no other privileges.
            runAsNonRoot: false
            runAsUser: 0
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
              add: [CHOWN, DAC_OVERRIDE, FOWNER]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      volumes:
        - name: config
          configMap:
            name: buildkit-seccomp-profile
        - name: host-seccomp
          hostPath:
            path: /var/lib/kubelet/seccomp
            type: DirectoryOrCreate
{{- end }}
