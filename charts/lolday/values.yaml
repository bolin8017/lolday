# =============================================================================
# Lolday Platform Configuration
# =============================================================================

global:
  namespace: lolday

# =============================================================================
# Private Container Registry (registry:2)
# =============================================================================
registry:
  enabled: false
  storage:
    size: 50Gi
    # Uses K3s default StorageClass (local-path)

# =============================================================================
# Training Pod Security
# =============================================================================
training:
  # NetworkPolicy: deny all egress from training pods
  networkPolicy:
    enabled: true

# =============================================================================
# Cloudflare Tunnel
# =============================================================================
cloudflare:
  enabled: true
  tunnelToken: ""       # --set at deploy time via $CF_TUNNEL_TOKEN
  replicas: 2
  image: cloudflare/cloudflared:2026.3.0    # pin explicit tag (no :latest)

# =============================================================================
# Backend API
# =============================================================================
backend:
  enabled: true
  image: harbor.lolday.svc:80/lolday/lolday-backend:phase8
  replicas: 1
  jwtSecret: ""         # --set at deploy time, NEVER commit
  firstAdmin:
    email: ""           # --set at deploy time
    password: ""        # --set at deploy time
  # NEW for Phase 3:
  fernetKey: ""                              # --set at deploy time
  harborAdminPassword: ""                    # --set at deploy time (shared with Harbor release)
  env:
    DOCS_ENABLED: "true"
    COOKIE_SECURE: "false"
    # NEW for Phase 3:
    HARBOR_URL: "http://harbor.lolday.svc.cluster.local:80"
    HARBOR_ADMIN_USERNAME: "admin"
    HARBOR_IMAGE_PREFIX: "harbor.lolday.svc:80"
    GITHUB_API_URL: "https://api.github.com"
    # BUILD_NAMESPACE + JOB_NAMESPACE are injected from `global.namespace` in
    # templates/backend.yaml — Phase 7.5 narrowed the pods Role to that ns, so
    # letting these two drift silently 403s GPU accounting.
    BUILD_IMAGE_HELPER: "harbor.lolday.svc:80/lolday/build-helper:v2"
    BUILD_IMAGE_BUILDKIT: "moby/buildkit:v0.29.0-rootless"
    BUILD_IMAGE_GIT: "alpine/git:v2.52.0"
    BUILD_TIMEOUT_SECONDS: "1200"
    BUILD_CONCURRENCY_PER_USER: "2"
    BACKEND_INTERNAL_URL: "http://backend.lolday.svc:8000"
    RECONCILER_ENABLED: "true"
    MLFLOW_TRACKING_URI: "http://mlflow.lolday.svc:5000"
    DATASET_CSV_MAX_BYTES: "10485760"
    JOB_HELPER_IMAGE: "harbor.lolday.svc:80/lolday/job-helper:v2"
    JOB_PER_USER_CONCURRENCY: "2"
    JOB_IDEMPOTENCY_WINDOW_SECONDS: "300"
    JOB_BACKEND_URL: "http://backend.lolday.svc:8000"
    SAMPLES_ROOT: "/mnt/samples"
    SAMPLES_LOCAL_ROOT: "/data"
    JOB_NODE_SELECTOR_HOSTNAME: "server30"
    # Phase 7.4 — UI base used to build Discord embed link buttons.
    LOLDAY_UI_BASE_URL: "https://lolday.connlabai.com"

# =============================================================================
# PostgreSQL
# =============================================================================
postgresql:
  enabled: true
  storage:
    size: 10Gi
  auth:
    database: lolday
    username: lolday
    password: ""        # --set at deploy time, NEVER commit

# =============================================================================
# Redis
# =============================================================================
redis:
  enabled: true

# =============================================================================
# Harbor Container Registry
# =============================================================================
harbor:
  enabled: true
  expose:
    type: clusterIP
    tls:
      enabled: false
  externalURL: http://harbor.lolday.svc.cluster.local:80
  harborAdminPassword: ""          # --set at deploy time
  persistence:
    enabled: true
    persistentVolumeClaim:
      registry:
        size: 100Gi
      jobservice:
        size: 2Gi
      database:
        size: 5Gi
      redis:
        size: 2Gi
      trivy:
        size: 10Gi
  trivy:
    enabled: true
    skipUpdate: false
  notary:
    enabled: false
  chartmuseum:
    enabled: false
  resources:
    core:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { cpu: 1, memory: 1Gi }
    jobservice:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { cpu: 1, memory: 1Gi }
    registry:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { cpu: 1, memory: 2Gi }
    portal:
      requests: { cpu: 50m, memory: 64Mi }
      limits: { cpu: 500m, memory: 256Mi }
    database:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { cpu: 1, memory: 1Gi }
    redis:
      requests: { cpu: 50m, memory: 64Mi }
      limits: { cpu: 500m, memory: 256Mi }
    trivy:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { cpu: 1, memory: 1Gi }
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      additionalLabels:
        # Must equal Helm release name — kps's default ruleSelector matches by
        # release label. Values files don't support templating, so if the
        # install command ever changes the release name, update this too.
        release: lolday
      interval: 60s

# =============================================================================
# MLflow Experiment Tracking
# =============================================================================
mlflow:
  enabled: true
  image: harbor.lolday.svc:80/lolday/mlflow-server:v2.20.3
  storage: 100Gi
  storageClassName: local-path
  service:
    port: 5000
  resources:
    requests: { cpu: 200m, memory: 512Mi }
    limits:   { cpu: 2, memory: 4Gi }
  db:
    username: mlflow
    database: mlflow
    password: ""   # injected via --set at deploy time (NEVER commit)

# =============================================================================
# Sample Datasets (hostPath PVs on server30)
# =============================================================================
samples:
  enabled: true
  hostPath: /mnt/ssd500g/data/samples
  storage: 600Gi
  nodeHostname: server30

# =============================================================================
# ML Training/Evaluation/Predict Jobs
# =============================================================================
jobs:
  helperImage: harbor.lolday.svc:80/lolday/job-helper:v2
  activeDeadlineSeconds:
    train: 21600
    evaluate: 1800
    predict: 3600
  perUserConcurrency: 2
  idempotencyWindowSeconds: 300
  networkPolicy:
    enabled: true

# =============================================================================
# Frontend (React SPA served by nginx-unprivileged)
# =============================================================================
frontend:
  image: harbor.lolday.svc:80/lolday/lolday-frontend:phase5
  host: lolday.connlabai.com
  replicas: 1
  resources:
    requests: { cpu: 10m, memory: 32Mi }
    limits:   { cpu: 100m, memory: 128Mi }

# =============================================================================
# Monitoring (Phase 6) — kube-prometheus-stack + loki + alloy (phase 9.2)
# =============================================================================
monitoring:
  enabled: true
  namespace: monitoring
  grafana:
    adminPassword: ""   # --set at deploy time (from Task 7)
  postgresExporter:
    enabled: true
    image: quay.io/prometheuscommunity/postgres-exporter:v0.17.0
    password: ""        # --set at deploy time, NEVER commit
    resources:
      requests: { cpu: 20m,  memory: 64Mi }
      limits:   { cpu: 100m, memory: 128Mi }

# Sub-chart config consumed as values of the kube-prometheus-stack chart (alias: kps)
kps:
  namespaceOverride: monitoring
  fullnameOverride: kps
  defaultRules:
    create: true

  prometheus:
    prometheusSpec:
      retention: 15d
      retentionSize: 18GiB            # leave ~10% head-room under 20 Gi PVC
      # Scrape every ServiceMonitor in the cluster (default scopes to the Helm release label)
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      probeSelectorNilUsesHelmValues: false
      ruleSelectorNilUsesHelmValues: false
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path
            accessModes: [ReadWriteOnce]
            resources:
              requests:
                storage: 20Gi
      resources:
        requests: { cpu: 500m, memory: 2Gi }
        limits:   { cpu: 2,    memory: 8Gi }

  alertmanager:
    alertmanagerSpec:
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path
            accessModes: [ReadWriteOnce]
            resources:
              requests:
                storage: 2Gi
      # Phase 7.1: Discord receivers live in an AlertmanagerConfig CR (see
      # templates/monitoring/alertmanager-config-discord.yaml), NOT inline. The AC
      # CRD's `apiURL` SecretKeySelector keeps webhook URLs in the
      # `alertmanager-discord` Secret (created by scripts/deploy.sh from
      # ~/.lolday-secrets.env) — never in git, values.yaml, or helm release state.
      # This also works around Prometheus Operator v0.86.2's inline-config
      # validator rejecting `webhook_url_file` on discord_configs (field added in
      # Alertmanager v0.28 but not yet in the operator's Go types).
      alertmanagerConfigSelector:
        matchLabels:
          lolday-alertmanager-config: discord
      alertmanagerConfigNamespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring
      # type: None prevents the operator from auto-wrapping AC CR sub-route matchers
      # in a {namespace=<ac-ns>} filter — lets our severity= matchers stand alone so
      # alerts from any namespace reach the right Discord channel.
      alertmanagerConfigMatcherStrategy:
        type: None
    config:
      route:
        receiver: 'null'
        group_by: [alertname, severity]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
      receivers:
        - name: 'null'

  grafana:
    persistence:
      enabled: true
      storageClassName: local-path
      size: 5Gi
    # Grafana chart 12.x ships the init-chown-data container with `capabilities.drop: [ALL]`
    # and `runAsUser: 0` — root without DAC_OVERRIDE cannot chown pre-existing files on
    # an upgraded PVC (fails with 'Permission denied' on /var/lib/grafana/{pdf,png,csv}).
    # fsGroup: 472 on the pod securityContext already triggers kubelet recursive chown at
    # mount time, so initChownData is redundant. Disable it to unblock the upgrade.
    initChownData:
      enabled: false
    # Credentials come from the Secret we create in templates/monitoring/grafana-admin-secret.yaml
    admin:
      existingSecret: grafana-admin
      userKey: admin-user
      passwordKey: admin-password
    defaultDashboardsEnabled: true
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        searchNamespace: ALL
      datasources:
        enabled: true
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits:   { cpu: 500m, memory: 1Gi }

  kubeStateMetrics: { enabled: true }
  nodeExporter:
    enabled: true

  # K3s embeds controller-manager / scheduler / kube-proxy / etcd as goroutines
  # inside the k3s server binary and only exposes their /metrics on
  # 127.0.0.1:10257/10259 — unreachable by Prometheus from a pod. Disable those
  # ServiceMonitors so they don't stay perpetually DOWN. The apiserver, by
  # contrast, is reachable via the standard kubernetes.default Service, so its
  # ServiceMonitor stays enabled.
  kubeApiServer:         { enabled: true }
  kubeControllerManager: { enabled: false }
  kubeScheduler:         { enabled: false }
  kubeProxy:             { enabled: false }
  kubeEtcd:              { enabled: false }

# =============================================================================
# Loki — log aggregation (single-binary mode)
# =============================================================================
loki:
  enabled: true
  # Top-level 'loki' key is consumed by the loki sub-chart directly
  # Pin fullname so downstream URLs are deterministic ('loki' not 'lolday-loki').
  fullnameOverride: loki
  deploymentMode: SingleBinary
  lokiCanary:
    enabled: false
  test:
    enabled: false
  loki:
    commonConfig:
      replication_factor: 1
    schemaConfig:
      configs:
        - from: 2024-04-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    storage:
      type: filesystem
      bucketNames:
        chunks: loki-chunks
        ruler: loki-ruler
        admin: loki-admin
    auth_enabled: false
    limits_config:
      retention_period: 168h          # 7 days
      reject_old_samples: true
      reject_old_samples_max_age: 168h
  singleBinary:
    replicas: 1
    persistence:
      enabled: true
      storageClass: local-path
      size: 30Gi
    resources:
      requests: { cpu: 200m, memory: 512Mi }
      limits:   { cpu: 1,    memory: 2Gi }
  # Required by loki chart's validate.yaml: SingleBinary mode must have
  # read/write/backend replicas=0 (otherwise the chart refuses to render,
  # demanding deploymentMode: SingleBinary<->SimpleScalable). The
  # 'coalesce warning: cannot overwrite table with non table for
  # loki.backend.image' this emits is a known, harmless quirk of merging a
  # scalar against the subchart's default image sub-map.
  read:    { replicas: 0 }
  write:   { replicas: 0 }
  backend: { replicas: 0 }
  # No ingress — internal only
  gateway:
    enabled: false
  # ChunksCache / ResultsCache are not needed at lab scale
  chunksCache: { enabled: false }
  resultsCache: { enabled: false }

# =============================================================================
# Grafana Alloy — DaemonSet log shipper (replaces Promtail, phase 9.2)
# =============================================================================
# Promtail reached EOL 2026-03-02; Grafana's successor is Alloy (OpenTelemetry
# Collector-based unified agent). River config below is the canonical
# Kubernetes-pod-logs-to-Loki recipe: discovery.kubernetes → node-local filter
# → /var/log/pods path build → loki.source.file → cri pipeline → loki.write.
# The `component` relabel is kept so future Grafana dashboards can split log
# streams by subchart component (harbor-core vs harbor-jobservice etc.) —
# as of phase 9 no dashboard consumes it, but it's free to preserve.
alloy:
  enabled: true
  controller:
    type: daemonset
  alloy:
    configMap:
      create: true
      content: |
        // Discover every Pod in the cluster via the K8s API.
        discovery.kubernetes "pods" {
          role = "pod"
        }

        // Keep only the pods running on this node (we run one alloy per node
        // via the DaemonSet and read logs from the host's /var/log/pods).
        discovery.relabel "pod_logs" {
          targets = discovery.kubernetes.pods.targets

          rule {
            source_labels = ["__meta_kubernetes_pod_node_name"]
            action        = "keep"
            regex         = sys.env("HOSTNAME")
          }

          // Standard namespace/pod/container/app labels that Promtail used
          // (implicit) and Grafana/Loki dashboards expect.
          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            target_label  = "namespace"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_name"]
            target_label  = "pod"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_container_name"]
            target_label  = "container"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
            target_label  = "app"
          }
          // Optional: pod's app.kubernetes.io/component label → `component`
          // so dashboards can split by subchart component (harbor-core vs
          // harbor-jobservice etc.). Free to keep; no current dashboard
          // depends on it.
          rule {
            source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_component"]
            target_label  = "component"
          }

          // Resolve the log-file path kubelet uses for this container.
          rule {
            source_labels = [
              "__meta_kubernetes_pod_uid",
              "__meta_kubernetes_pod_container_name",
            ]
            separator    = "/"
            action       = "replace"
            replacement  = "/var/log/pods/*$1/*.log"
            target_label = "__path__"
          }
        }

        local.file_match "pod_logs" {
          path_targets = discovery.relabel.pod_logs.output
        }

        loki.source.file "pod_logs" {
          targets    = local.file_match.pod_logs.targets
          forward_to = [loki.process.pod_logs.receiver]
        }

        loki.process "pod_logs" {
          forward_to = [loki.write.loki.receiver]
          stage.cri {}
        }

        loki.write "loki" {
          endpoint {
            url = "http://loki.lolday.svc:3100/loki/api/v1/push"
          }
          // On-disk WAL so a Loki restart / PVC-lost incident doesn't drop
          // the in-flight log buffer silently. `loki_write_wal_*` +
          // `loki_write_dropped_*` metrics are already scraped via the
          // chart's ServiceMonitor below; alert rules in alertmanager-
          // rules.yaml fire if dropped_samples > 0 over 10m.
          wal {
            enabled         = true
            max_segment_age = "1h"
          }
        }
    mounts:
      varlog: true
      dockercontainers: true
    resources:
      requests: { cpu: 50m,  memory: 64Mi }
      limits:   { cpu: 200m, memory: 256Mi }
  serviceMonitor:
    enabled: true

# =============================================================================
# Trivy Operator — cluster-wide CVE / config / RBAC / secret scanning (Phase 7.2)
# =============================================================================
# Upstream chart key is `trivy-operator` (kebab-case); referenced here verbatim.
# The operator reconciles each workload in-scope into VulnerabilityReport /
# ConfigAuditReport / ExposedSecretReport / RbacAssessmentReport CRs and
# publishes per-image CVE counts on a /metrics endpoint. Our chart adds a
# ServiceMonitor (templates/monitoring/servicemonitor-trivy.yaml) and a
# PrometheusRule alert (lolday-trivy.rules in alertmanager-rules.yaml) that
# routes CRITICAL CVEs to Discord critical via the Phase 7.1 AC CR pipeline.
trivy-operator:
  enabled: true
  # Skip system-churn namespaces (kube-system, gpu-operator manage lots of
  # short-lived pods) + trivy-system itself (don't scan the scanner) + default
  # (never hosts workloads here). Scans still cover lolday, monitoring, harbor.
  excludeNamespaces: "kube-system,trivy-system,gpu-operator,default"
  # The chart's own ServiceMonitor is off — we ship our own in templates/
  # monitoring/servicemonitor-trivy.yaml for consistency with Phase 7.1.1 DCGM
  # and Phase 6 SM pattern (cross-ns select from monitoring).
  serviceMonitor:
    enabled: false
  operator:
    # Install into a dedicated ns so the scanner workload is isolated from the
    # lolday release ns. Default is .Release.Namespace (=lolday) which we don't
    # want — same reasoning as kps.namespaceOverride: monitoring in Phase 6.
    namespace: trivy-system
    # Emit the trivy_image_vulnerabilities metric (on by default, but pin).
    metricsFindingsEnabled: true
    # Don't install Trivy's in-cluster DB server — use on-demand mode. Saves
    # the ~1.5Gi standalone server Pod; workload scanners pull the DB once per
    # cycle. For lab scale this is enough.
    builtInTrivyServer: false
  trivy:
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits:   { cpu: 500m, memory: 1Gi }

# =============================================================================
# Volcano — batch scheduler for GPU training jobs (Phase 7.3)
# =============================================================================
# Upstream chart `volcano` (volcano-sh/helm-charts). Our backend emits
# `batch.volcano.sh/v1alpha1 Job` via job_spec.build_volcano_job_manifest()
# against the `lolday-training` Queue (templates/volcano-queue.yaml).
# Build Jobs (BuildKit rootless image builds, phase 9.3) stay on `batch/v1 Job` — no need for queue
# or gang scheduling for non-GPU workloads.
#
# The subchart hardcodes `{{ .Release.Namespace }}` across all its templates
# (no namespaceOverride option), so its controller / scheduler / admission
# pods land in the release ns (lolday) — NOT the conventional volcano-system.
volcano:
  # Controls both the subchart condition (Chart.yaml) and the Queue /
  # ServiceMonitor templates below.
  enabled: true
  custom:
    # Export Prometheus metrics from the scheduler / controller — our chart's
    # ServiceMonitor (templates/monitoring/servicemonitor-volcano.yaml) scrapes
    # these. Default is false; explicit opt-in here.
    metrics_enable: true
