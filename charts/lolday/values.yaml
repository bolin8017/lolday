# =============================================================================
# Lolday Platform Configuration
# =============================================================================

global:
  namespace: lolday
  # Phase 1 (2026-05-05) — detector vcjobs + BuildKit Jobs run in this
  # dedicated namespace so a per-namespace ResourceQuota / LimitRange
  # can cap them without constraining infra (postgres / prometheus / etc.).
  # See docs/superpowers/specs/2026-05-05-gpu-scheduling-and-oom-defense-design.md §6.2
  jobsNamespace: lolday-jobs

# =============================================================================
# Private Container Registry (registry:2)
# =============================================================================
registry:
  enabled: false
  storage:
    size: 50Gi
    # Uses K3s default StorageClass (local-path)

# =============================================================================
# Cloudflare Tunnel
# =============================================================================
cloudflare:
  enabled: true
  tunnelToken: "" # --set at deploy time via $CF_TUNNEL_TOKEN
  replicas: 2
  image: cloudflare/cloudflared:2026.3.0@sha256:6b599ca3e974349ead3286d178da61d291961182ec3fe9c505e1dd02c8ac31b0 # pin explicit tag (no :latest)

# =============================================================================
# Backend API
# =============================================================================
backend:
  enabled: true
  # H-21-img: digest pin makes the reference content-addressable. The
  # tag suffix stays because Harbor's display + check-image-tags-aligned
  # hook both key off the version. Capture the digest via
  #   docker buildx imagetools inspect harbor.lolday.svc:80/lolday/lolday-backend:v0.21.3 --format '{{.Manifest.Digest}}'
  # at release time.
  image: harbor.lolday.svc:80/lolday/lolday-backend:v0.21.3@sha256:ca7caf628acc5c930826c7f9b82073de1a970ab9c0c42abb03a434779f98a197
  replicas: 1
  # Auth is Cloudflare Access SSO (see CF_ACCESS_* under env below); no
  # backend-side password secrets / firstAdmin seed / cookie config.
  # NEW for Phase 3:
  fernetKeys: "" # whitespace-separated list of base64 Fernet keys; --set at deploy time
  harborAdminPassword: "" # --set at deploy time (shared with Harbor release)
  env:
    DOCS_ENABLED: "false"
    # NEW for Phase 3:
    HARBOR_URL: "http://harbor.lolday.svc.cluster.local:80"
    HARBOR_ADMIN_USERNAME: "admin"
    HARBOR_IMAGE_PREFIX: "harbor.lolday.svc:80"
    GITHUB_API_URL: "https://api.github.com"
    # BUILD_NAMESPACE + JOB_NAMESPACE are injected from `global.namespace` in
    # templates/backend.yaml — Phase 7.5 narrowed the pods Role to that ns, so
    # letting these two drift silently 403s GPU accounting.
    BUILD_IMAGE_BUILDKIT: "moby/buildkit:v0.29.0-rootless"
    BUILD_IMAGE_GIT: "alpine/git:v2.52.0"
    BUILD_TIMEOUT_SECONDS: "1200"
    BUILD_CONCURRENCY_PER_USER: "2"
    BACKEND_INTERNAL_URL: "http://backend.lolday.svc:8000"
    RECONCILER_ENABLED: "true"
    MLFLOW_TRACKING_URI: "http://mlflow.lolday.svc:5000"
    DATASET_CSV_MAX_BYTES: "10485760"
    JOB_PER_USER_CONCURRENCY: "2"
    JOB_IDEMPOTENCY_WINDOW_SECONDS: "300"
    # M-internal-split (P2): internal callback API moved to port 8001 on a
    # separate FastAPI app. NetworkPolicy gates 8001 to lolday-jobs only.
    INTERNAL_EVENTS_BASE_URL: "http://backend:8001"
    JOB_BACKEND_URL: "http://backend.lolday.svc:8001"
    SAMPLES_ROOT: "/mnt/samples"
    SAMPLES_LOCAL_ROOT: "/data"
    JOB_NODE_SELECTOR_HOSTNAME: "server30"
    # Phase 7.4 — UI base used to build Discord embed link buttons.
    LOLDAY_UI_BASE_URL: "https://lolday.connlabai.com"
    # Phase 10 — Cloudflare Access SSO (IAP). Every request is expected to
    # carry the `Cf-Access-Jwt-Assertion` header injected by cloudflared;
    # backend verifies the signature against this team's JWKS and validates
    # `aud` equals CF_ACCESS_APP_AUD.
    ENVIRONMENT: "production" # enables startup SSO-config assertions
    CF_ACCESS_TEAM_DOMAIN: "bolin8017.cloudflareaccess.com"
    # NOT the Access App UUID (d4271ba9-...). Cloudflare's Access App has two
    # identifiers — `uid` (UUID, used in API URLs) and `aud` (64-char hex used
    # in the JWT `aud` claim). JWT validation checks `aud`, so this is the
    # right value. Fetch with:
    #   curl -H "Authorization: Bearer $CF_API_TOKEN" \
    #        https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/access/apps/<uid> \
    #        | jq .result.aud
    CF_ACCESS_APP_AUD: "b4175457e4dca534925f0559e32c22aefb46d1caaa1ccc713f742d53825e6584"
    CF_ACCESS_JWKS_CACHE_TTL_SECONDS: "600"
    AUTH_DEV_MODE: "false" # NEVER set to "true" in production
    # One-time Alembic phase10_sso_admin_email migration renames the seeded
    # admin@lolday.dev row to this email so the operator's first SSO login
    # maps onto the existing row (preserving legacy owner_id values).
    SSO_ADMIN_EMAIL: "bolin8017@gmail.com"

# =============================================================================
# BuildKit — custom seccomp profile installer (H-11, P2)
# =============================================================================
# BuildKit-rootless needs user-namespace syscalls (setuid/setgid/clone/unshare)
# that the PSS Restricted-default `RuntimeDefault` seccomp profile blocks. The
# previous `seccompProfile: Unconfined` on the buildkit container was maximum-
# permission; this replaces it with a Localhost-type profile pointing at the
# Docker Engine default seccomp (moby/moby v28.0.0 profiles/seccomp/default.json)
# — the canonical allowlist BuildKit-rootless docs reference. The seccomp JSON
# is committed at charts/lolday/files/buildkit/seccomp.json and installed onto
# each node's kubelet seccomp dir by the buildkit-seccomp-installer DaemonSet
# (templates/buildkit-seccomp-installer.yaml). See backend/app/services/build.py
# buildkit_sc for the matching securityContext.
buildkit:
  seccompProfile:
    enabled: true

# =============================================================================
# PostgreSQL
# =============================================================================
postgresql:
  enabled: true
  # Pin to alpine variant — smaller surface, fewer glibc CVEs. PG data
  # files are byte-identical between debian/alpine builds at the same
  # major, so the swap is reversible.
  image: postgres:16-alpine@sha256:4e6e670bb069649261c9c18031f0aded7bb249a5b6664ddec29c013a89310d50
  storage:
    size: 10Gi
  auth:
    database: lolday
    username: lolday
    password: "" # --set at deploy time, NEVER commit

# =============================================================================
# Redis
# =============================================================================
redis:
  enabled: true
  # Pin to a specific minor (alpine variant) — the rolling `7-alpine` tag
  # picked up CVE-2025-68121 (Go crypto/tls) via baked-in tooling and the
  # tag was immutable so re-pulls didn't refresh the layer.
  image: redis:7.4-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
  # operator MUST `--set redis.auth.password=<strong>` at deploy time.
  # An empty value here is intentional — the chart's required() validator
  # fails fast if you forget.
  auth:
    password: ""

# =============================================================================
# Harbor Container Registry
# =============================================================================
# Chart 1.18.3 ships goharbor/* :v2.14.3 by default, but those base images
# carry CRITICAL CVEs (CVE-2026-2781, CVE-2026-4438, CVE-2026-33186 from
# glibc / NSS / google.golang.org/grpc). Upstream v2.15.0 ships rebuilt
# Photon bases. The v2.15 docker-hub proxy-cache regression
# (goharbor/harbor#23145) doesn't affect us — we don't enable that feature.
harbor:
  enabled: true
  nginx:
    image:
      tag: v2.15.0@sha256:4fcfe831b1d99e3193a586e59ba4984ca2587a9b2998ccd433f8e9425beaabdc
  portal:
    image:
      tag: v2.15.0@sha256:541d5fa95bf77240d46a438f86245cdfd6afa6dd7fdd0cf4dd4c905af6a980b1
  core:
    image:
      tag: v2.15.0@sha256:32a13f6693a278261e9c9cb7eb606c5e2aa021308ae44fdc73225755048500a8
  jobservice:
    image:
      tag: v2.15.0@sha256:a22c7cccba4673b26ffb96f5c37971d85d879dd837bc82448e01c0170b68cf28
  registry:
    registry:
      image:
        tag: v2.15.0@sha256:beb49fd16cf0906c04a2bf51a22f7210289e7cc2ae43a733e2a0364380aceae6
    controller:
      image:
        tag: v2.15.0@sha256:463172f71d3a1e8d4f9e3b4e687a447f41fbc3126316d8c150dba04a903bbc47
  database:
    internal:
      image:
        tag: v2.15.0@sha256:b54e48a70a7bc173a213f59d826d09bd5d3ad94ab00f2b3335751ff43edeb842
  redis:
    internal:
      image:
        tag: v2.15.0@sha256:5da5570c0a4c2adae897a30656f1f2f6377f84c11e789b1010732a96b938f34e
  exporter:
    image:
      tag: v2.15.0@sha256:ad065e4e1a0ee900a0bb1a03d57028ed4b51dc04933f5c1cb5c4aee301a72ddb
  expose:
    type: clusterIP
    tls:
      enabled: false
  externalURL: http://harbor.lolday.svc.cluster.local:80
  harborAdminPassword: "" # --set at deploy time
  persistence:
    enabled: true
    persistentVolumeClaim:
      registry:
        size: 1Gi # minimum required by chart schema; not used when imageChartStorage.type=s3
      jobservice:
        size: 2Gi
      database:
        size: 5Gi
      redis:
        size: 2Gi
      trivy:
        size: 10Gi
    imageChartStorage:
      type: s3
      disableredirect: true # serve via Harbor, not S3 presigned URL
      s3:
        region: us-east-1
        bucket: harbor-blobs
        regionendpoint: http://lolday-minio.lolday.svc:9000
        existingSecret: harbor-s3-cred
        skipverify: true
        v4auth: true
        secure: false
  trivy:
    enabled: true
    skipUpdate: false
    image:
      tag: v2.15.0@sha256:6fd6de9cfbbb04cb1d94722cfa01cf71b8994d3f9e7891d3b03a89a7536480ba
  notary:
    enabled: false
  chartmuseum:
    enabled: false
  resources:
    core:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { cpu: 1, memory: 1Gi }
    jobservice:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { cpu: 1, memory: 1Gi }
    registry:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { cpu: 1, memory: 2Gi }
    portal:
      requests: { cpu: 50m, memory: 64Mi }
      limits: { cpu: 500m, memory: 256Mi }
    database:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { cpu: 1, memory: 1Gi }
    redis:
      requests: { cpu: 50m, memory: 64Mi }
      limits: { cpu: 500m, memory: 256Mi }
    trivy:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { cpu: 1, memory: 1Gi }
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      additionalLabels:
        # Must equal Helm release name — kps's default ruleSelector matches by
        # release label. Values files don't support templating, so if the
        # install command ever changes the release name, update this too.
        release: lolday
      interval: 60s

# =============================================================================
# MLflow Experiment Tracking
# =============================================================================
mlflow:
  enabled: true
  image: harbor.lolday.svc:80/lolday/mlflow-server:v2.20.3-boto3@sha256:593e2be53b57b4d5c4438663a01b70575a61682dcd4e5f6e800899d86418b241
  storage: 100Gi
  storageClassName: local-path
  service:
    port: 5000
  resources:
    requests: { cpu: 200m, memory: 512Mi }
    limits: { cpu: 2, memory: 4Gi }
  db:
    username: mlflow
    database: mlflow
    password: "" # injected via --set at deploy time (NEVER commit)

# =============================================================================
# Sample Datasets (hostPath PVs on server30)
# =============================================================================
samples:
  enabled: true
  hostPath: /mnt/lolday-samples
  storage: 600Gi
  nodeHostname: server30

# =============================================================================
# ML Training/Evaluation/Predict Jobs
# =============================================================================
jobs:
  activeDeadlineSeconds:
    train: 21600
    evaluate: 1800
    predict: 3600
  perUserConcurrency: 2
  idempotencyWindowSeconds: 300
  networkPolicy:
    enabled: true

# =============================================================================
# Frontend (React SPA served by nginx-unprivileged)
# =============================================================================
frontend:
  image: harbor.lolday.svc:80/lolday/lolday-frontend:v0.21.3@sha256:e055ccb7418123031076931c019a7f970e5de5a8b4f906a5985a108d9fc075e2
  host: lolday.connlabai.com
  replicas: 1
  resources:
    requests: { cpu: 10m, memory: 32Mi }
    limits: { cpu: 100m, memory: 128Mi }

# =============================================================================
# Monitoring (Phase 6) — kube-prometheus-stack + loki + alloy (phase 9.2)
# =============================================================================
monitoring:
  enabled: true
  namespace: monitoring
  grafana:
    adminPassword: "" # --set at deploy time (from Task 7)
  postgresExporter:
    enabled: true
    image: quay.io/prometheuscommunity/postgres-exporter:v0.17.0@sha256:f8381eb4326afd254efcdc2ef127cd16a0a8cd68c32c4a6bf1629a4f3dd71c0a
    password: "" # --set at deploy time, NEVER commit
    resources:
      requests: { cpu: 20m, memory: 64Mi }
      limits: { cpu: 100m, memory: 128Mi }

# Sub-chart config consumed as values of the kube-prometheus-stack chart (alias: kps)
kps:
  namespaceOverride: monitoring
  fullnameOverride: kps
  defaultRules:
    create: true

  prometheus:
    prometheusSpec:
      retention: 15d
      retentionSize: 18GiB # leave ~10% head-room under 20 Gi PVC
      # Scrape every ServiceMonitor in the cluster (default scopes to the Helm release label)
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      probeSelectorNilUsesHelmValues: false
      ruleSelectorNilUsesHelmValues: false
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path
            accessModes: [ReadWriteOnce]
            resources:
              requests:
                storage: 20Gi
      resources:
        requests: { cpu: 500m, memory: 2Gi }
        limits: { cpu: 2, memory: 8Gi }

  alertmanager:
    alertmanagerSpec:
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path
            accessModes: [ReadWriteOnce]
            resources:
              requests:
                storage: 2Gi
      # Phase 7.1: Discord receivers live in an AlertmanagerConfig CR (see
      # templates/monitoring/alertmanager-config-discord.yaml), NOT inline. The AC
      # CRD's `apiURL` SecretKeySelector keeps webhook URLs in the
      # `alertmanager-discord` Secret (created by scripts/deploy.sh from
      # ~/.lolday-secrets.env) — never in git, values.yaml, or helm release state.
      # This also works around Prometheus Operator v0.86.2's inline-config
      # validator rejecting `webhook_url_file` on discord_configs (field added in
      # Alertmanager v0.28 but not yet in the operator's Go types).
      alertmanagerConfigSelector:
        matchLabels:
          lolday-alertmanager-config: discord
      alertmanagerConfigNamespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring
      # type: None prevents the operator from auto-wrapping AC CR sub-route matchers
      # in a {namespace=<ac-ns>} filter — lets our severity= matchers stand alone so
      # alerts from any namespace reach the right Discord channel.
      alertmanagerConfigMatcherStrategy:
        type: None
    config:
      route:
        receiver: "null"
        group_by: [alertname, severity]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
      receivers:
        - name: "null"

  grafana:
    persistence:
      enabled: true
      storageClassName: local-path
      size: 5Gi
    # Grafana chart 12.x ships the init-chown-data container with `capabilities.drop: [ALL]`
    # and `runAsUser: 0` — root without DAC_OVERRIDE cannot chown pre-existing files on
    # an upgraded PVC (fails with 'Permission denied' on /var/lib/grafana/{pdf,png,csv}).
    # fsGroup: 472 on the pod securityContext already triggers kubelet recursive chown at
    # mount time, so initChownData is redundant. Disable it to unblock the upgrade.
    initChownData:
      enabled: false
    # Credentials come from the Secret we create in templates/monitoring/grafana-admin-secret.yaml
    admin:
      existingSecret: grafana-admin
      userKey: admin-user
      passwordKey: admin-password
    defaultDashboardsEnabled: true
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        searchNamespace: ALL
      datasources:
        enabled: true
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { cpu: 500m, memory: 1Gi }

  kubeStateMetrics: { enabled: true }
  nodeExporter:
    enabled: true

  # K3s embeds controller-manager / scheduler / kube-proxy / etcd as goroutines
  # inside the k3s server binary and only exposes their /metrics on
  # 127.0.0.1:10257/10259 — unreachable by Prometheus from a pod. Disable those
  # ServiceMonitors so they don't stay perpetually DOWN. The apiserver, by
  # contrast, is reachable via the standard kubernetes.default Service, so its
  # ServiceMonitor stays enabled.
  kubeApiServer: { enabled: true }
  kubeControllerManager: { enabled: false }
  kubeScheduler: { enabled: false }
  kubeProxy: { enabled: false }
  kubeEtcd: { enabled: false }

# =============================================================================
# Loki — log aggregation (single-binary mode)
# =============================================================================
loki:
  enabled: true
  # Top-level 'loki' key is consumed by the loki sub-chart directly
  # Pin fullname so downstream URLs are deterministic ('loki' not 'lolday-loki').
  fullnameOverride: loki
  deploymentMode: SingleBinary
  lokiCanary:
    enabled: false
  test:
    enabled: false
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
      path_prefix: /tmp/loki # no PVC; compactor working dir uses tmpfs
    storage:
      type: s3
      bucketNames:
        chunks: loki-chunks
        ruler: loki-ruler
      s3:
        endpoint: lolday-minio.lolday.svc:9000
        region: us-east-1
        accessKeyId: "" # filled by extraEnv below via AWS_ACCESS_KEY_ID
        secretAccessKey: "" # filled by extraEnv below via AWS_SECRET_ACCESS_KEY
        s3ForcePathStyle: true # required for MinIO path-style addressing
        insecure: true # internal cluster, http only
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    limits_config:
      retention_period: 168h # 7 days
      reject_old_samples: true
      reject_old_samples_max_age: 168h
  singleBinary:
    replicas: 1
    extraEnv:
      - name: AWS_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: loki-s3-cred
            key: access-key
      - name: AWS_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: loki-s3-cred
            key: secret-key
    persistence:
      enabled: false # state in S3, not local
    resources:
      requests: { cpu: 200m, memory: 512Mi }
      limits: { cpu: 1, memory: 2Gi }
  # Required by loki chart's validate.yaml: SingleBinary mode must have
  # read/write/backend replicas=0 (otherwise the chart refuses to render,
  # demanding deploymentMode: SingleBinary<->SimpleScalable). The
  # 'coalesce warning: cannot overwrite table with non table for
  # loki.backend.image' this emits is a known, harmless quirk of merging a
  # scalar against the subchart's default image sub-map.
  read: { replicas: 0 }
  write: { replicas: 0 }
  backend: { replicas: 0 }
  # No ingress — internal only
  gateway:
    enabled: false
  # ChunksCache / ResultsCache are not needed at lab scale
  chunksCache: { enabled: false }
  resultsCache: { enabled: false }
  # The loki chart still pins kiwigrid/k8s-sidecar:2.5.0 by default;
  # that image carries CVE-2025-15467 (OpenSSL RCE/DoS via oversized IV,
  # fixed in libssl 3.5.5-r0). 2.7.1 is the alpine rebuild with the
  # patched OpenSSL.
  sidecar:
    image:
      tag: 2.7.1@sha256:5bc0c5634d4aae468e27e98bf1aae4f45d82fcbfd73baf4a9d3fb0699c62f83d

# =============================================================================
# Grafana Alloy — DaemonSet log shipper (replaces Promtail, phase 9.2)
# =============================================================================
# Promtail reached EOL 2026-03-02; Grafana's successor is Alloy (OpenTelemetry
# Collector-based unified agent). River config below is the canonical
# Kubernetes-pod-logs-to-Loki recipe: discovery.kubernetes → node-local filter
# → /var/log/pods path build → loki.source.file → cri pipeline → loki.write.
# The `component` relabel is kept so future Grafana dashboards can split log
# streams by subchart component (harbor-core vs harbor-jobservice etc.) —
# as of phase 9 no dashboard consumes it, but it's free to preserve.
alloy:
  enabled: true
  controller:
    type: daemonset
  alloy:
    configMap:
      create: true
      content: |
        // Discover every Pod in the cluster via the K8s API.
        discovery.kubernetes "pods" {
          role = "pod"
        }

        // Keep only the pods running on this node (we run one alloy per node
        // via the DaemonSet and read logs from the host's /var/log/pods).
        discovery.relabel "pod_logs" {
          targets = discovery.kubernetes.pods.targets

          rule {
            source_labels = ["__meta_kubernetes_pod_node_name"]
            action        = "keep"
            regex         = sys.env("HOSTNAME")
          }

          // Standard namespace/pod/container/app labels that Promtail used
          // (implicit) and Grafana/Loki dashboards expect.
          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            target_label  = "namespace"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_name"]
            target_label  = "pod"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_container_name"]
            target_label  = "container"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
            target_label  = "app"
          }
          // Optional: pod's app.kubernetes.io/component label → `component`
          // so dashboards can split by subchart component (harbor-core vs
          // harbor-jobservice etc.). Free to keep; no current dashboard
          // depends on it.
          rule {
            source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_component"]
            target_label  = "component"
          }

          // Resolve the log-file path kubelet uses for this container.
          rule {
            source_labels = [
              "__meta_kubernetes_pod_uid",
              "__meta_kubernetes_pod_container_name",
            ]
            separator    = "/"
            action       = "replace"
            replacement  = "/var/log/pods/*$1/*.log"
            target_label = "__path__"
          }
        }

        local.file_match "pod_logs" {
          path_targets = discovery.relabel.pod_logs.output
        }

        loki.source.file "pod_logs" {
          targets    = local.file_match.pod_logs.targets
          forward_to = [loki.process.pod_logs.receiver]
        }

        loki.process "pod_logs" {
          forward_to = [loki.write.loki.receiver]
          stage.cri {}
        }

        loki.write "loki" {
          endpoint {
            url = "http://loki.lolday.svc:3100/loki/api/v1/push"
          }
          // On-disk WAL so a Loki restart / PVC-lost incident doesn't drop
          // the in-flight log buffer silently. `loki_write_wal_*` +
          // `loki_write_dropped_*` metrics are already scraped via the
          // chart's ServiceMonitor below; alert rules in alertmanager-
          // rules.yaml fire if dropped_samples > 0 over 10m.
          wal {
            enabled         = true
            max_segment_age = "1h"
          }
        }
    mounts:
      varlog: true
      dockercontainers: true
    resources:
      requests: { cpu: 50m, memory: 64Mi }
      limits: { cpu: 200m, memory: 256Mi }
  serviceMonitor:
    enabled: true

# =============================================================================
# Trivy Operator — cluster-wide CVE / config / RBAC / secret scanning (Phase 7.2)
# =============================================================================
# Upstream chart key is `trivy-operator` (kebab-case); referenced here verbatim.
# The operator reconciles each workload in-scope into VulnerabilityReport /
# ConfigAuditReport / ExposedSecretReport / RbacAssessmentReport CRs and
# publishes per-image CVE counts on a /metrics endpoint. Our chart adds a
# ServiceMonitor (templates/monitoring/servicemonitor-trivy.yaml) and a
# PrometheusRule alert (lolday-trivy.rules in alertmanager-rules.yaml) that
# routes CRITICAL CVEs to Discord critical via the Phase 7.1 AC CR pipeline.
trivy-operator:
  enabled: true
  # Skip system-churn namespaces (kube-system, gpu-operator manage lots of
  # short-lived pods) + trivy-system itself (don't scan the scanner) + default
  # (never hosts workloads here). Scans still cover lolday, monitoring, harbor.
  excludeNamespaces: "kube-system,trivy-system,gpu-operator,default"
  # The chart's own ServiceMonitor is off — we ship our own in templates/
  # monitoring/servicemonitor-trivy.yaml for consistency with Phase 7.1.1 DCGM
  # and Phase 6 SM pattern (cross-ns select from monitoring).
  serviceMonitor:
    enabled: false
  operator:
    # Install into a dedicated ns so the scanner workload is isolated from the
    # lolday release ns. Default is .Release.Namespace (=lolday) which we don't
    # want — same reasoning as kps.namespaceOverride: monitoring in Phase 6.
    namespace: trivy-system
    # Emit the trivy_image_vulnerabilities metric (on by default, but pin).
    metricsFindingsEnabled: true
    # Don't install Trivy's in-cluster DB server — use on-demand mode. Saves
    # the ~1.5Gi standalone server Pod; workload scanners pull the DB once per
    # cycle. For lab scale this is enough.
    builtInTrivyServer: false
  trivy:
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { cpu: 500m, memory: 1Gi }
    # Residual CVEs whose fixes exist upstream but haven't reached the
    # images we deploy yet. Chart-level bumps fix the bulk; this Rego
    # policy closes the long tail so TrivyCriticalCVE only fires on
    # genuinely-new findings. Re-evaluate by 2026-07-28 — remove an
    # entry from `residual_cves` once the upstream image ships a
    # fixed tag.
    #
    # Per-CVE rationale:
    # - CVE-2025-68121 — Go crypto/tls cert-validation bypass on
    #   resumed TLS. Fixed in Go 1.24.13 / 1.25.7. Hits 9 images
    #   (Volcano, Harbor v2.15.0, cloudflared, kiwigrid sidecar,
    #   kube-state-metrics, postgres-exporter, loki, prom-config-
    #   reloader, redis tooling). Edge TLS terminates at Cloudflare;
    #   internal cluster doesn't mutate TLS configs mid-session.
    # - CVE-2026-4438 — glibc gethostbyaddr DNS hostname. Fixed in
    #   2.36-23.ph5 (Photon OS 5). 10 Harbor v2.15.0 images. Pending
    #   Harbor base-image rebuild on Photon ph5.
    # - CVE-2026-2781 — NSS integer overflow. Fixed in 3.78-12.ph5.
    #   10 Harbor v2.15.0 images. Same Photon rebuild blocker.
    # - CVE-2026-33186 — google.golang.org/grpc authz bypass. Fixed in
    #   grpc-go 1.79.3. 5 images. Harbor / Volcano don't expose grpc
    #   authz here, so not exploitable.
    # - CVE-2026-31789 — Alpine musl. Fixed in 3.5.6-r0. 5 images on
    #   older alpine bases. Vulnerable paths not exercised.
    # - CVE-2023-24538 / -24540 / 2024-24790 — old Go CVEs (html/
    #   template, net/netip). Long-fixed upstream but baked into
    #   redis:7.4-alpine tooling. Redis used only for rate-limit cache.
    #
    # The trivy-operator chart's `ignoreFile` value is broken for both
    # string and list inputs (mangled by `toYaml | nindent` — emits
    # leading `|` or `-` that Trivy CLI rejects). The chart's
    # `ignorePolicy` path uses `trim | nindent`, which preserves Rego
    # source verbatim — so we route the suppression through Rego.
    ignorePolicy: |
      package trivy

      default ignore = false

      residual_cves := {
        "CVE-2025-68121",
        "CVE-2026-4438",
        "CVE-2026-2781",
        "CVE-2026-33186",
        "CVE-2026-31789",
        "CVE-2023-24538",
        "CVE-2023-24540",
        "CVE-2024-24790",
      }

      ignore {
        input.VulnerabilityID == residual_cves[_]
      }

# =============================================================================
# Volcano — batch scheduler for GPU training jobs (Phase 7.3)
# =============================================================================
# Upstream chart `volcano` (volcano-sh/helm-charts). Our backend emits
# `batch.volcano.sh/v1alpha1 Job` via job_spec.build_volcano_job_manifest()
# against the `lolday-training` Queue (templates/volcano-queue.yaml).
# Build Jobs (BuildKit rootless image builds, phase 9.3) stay on `batch/v1 Job` — no need for queue
# or gang scheduling for non-GPU workloads.
#
# The subchart hardcodes `{{ .Release.Namespace }}` across all its templates
# (no namespaceOverride option), so its controller / scheduler / admission
# pods land in the release ns (lolday) — NOT the conventional volcano-system.
volcano:
  # Controls both the subchart condition (Chart.yaml) and the Queue /
  # ServiceMonitor templates below.
  enabled: true
  custom:
    # Phase 9.5: keep scheduler / controller /metrics endpoints (defaults
    # scheduler_metrics_enable=true, controller_metrics_enable=true — our
    # servicemonitor-volcano.yaml scrapes them), but do NOT deploy the
    # subchart's bundled kube-state-metrics / Prometheus / Grafana. The
    # bundled KSM ships `volcanosh/kube-state-metrics:v2.0.0-beta` (2020-
    # era) carrying 6 Critical CVEs, and kube-prometheus-stack already
    # provides the real KSM + Prometheus + Grafana for the cluster. The
    # master `metrics_enable` flag gates those three extra templates only.
    metrics_enable: false

# =============================================================================
# MinIO Object Storage
# =============================================================================
minio:
  enabled: true
  mode: standalone # Single-node-single-drive; multi-pool via extraArgs later
  rootUser: minio-admin
  existingSecret: minio-root-cred
  replicas: 1
  drivesPerNode: 1
  persistence:
    enabled: true
    storageClass: local-path
    size: 100Gi
    accessMode: ReadWriteOnce
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 2
      memory: 4Gi
  service:
    type: ClusterIP
    port: "9000"
  consoleService:
    type: ClusterIP
    port: "9001"
  metrics:
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: lolday
  # Buckets / svcaccts are created by our own Job (templates/minio-init-buckets-job.yaml),
  # NOT via the chart's buckets/policies block — gives us full control of lifecycle + IAM.
  buckets: []
  policies: []
  # Override the default console user created by the chart (chart default: console/console123)
  # We manage IAM entirely via the init Job; no chart-managed users.
  users: []

# =============================================================================
# Kyverno — admission-time image verification + PSS background audit (P4)
# =============================================================================
# The verifyImages ClusterPolicy in templates/policies/verify-images.yaml
# (added in T10) admits only images whose cosign signature matches the
# lolday GHCR workflow identity. Scoped to `lolday` + `lolday-jobs` so
# kyverno's own ns is excluded — a subsequent kyverno upgrade cannot be
# rejected by its own webhook (see plan D2).
#
# Mainstream prod settings: per-policy `spec.failurePolicy: Fail` (Kyverno
# 3.x default, set on each ClusterPolicy in T10) is enforced cluster-wide
# because `features.forceFailurePolicyIgnore.enabled: false` (chart
# default — set explicitly here to document intent). If kyverno is
# unreachable, lolday + lolday-jobs admissions block — matches prod-grade
# installs.
#
# PSS enforcement from P2 (built-in Pod Security admission labels on
# lolday/lolday-jobs namespaces) stays in place; this sub-chart adds the
# audit-mode PSS background scan as defense-in-depth.
kyverno:
  enabled: true
  fullnameOverride: kyverno
  # Kyverno is installed as a sub-chart into the same release namespace as
  # lolday (= `lolday`). The chart's default `config.excludeKyvernoNamespace:
  # true` auto-appends the install ns to the webhook's namespaceSelector
  # NotIn list — i.e. Kyverno wouldn't intercept ANY pod in `lolday`. Our
  # verifyImages ClusterPolicy explicitly matches `lolday` + `lolday-jobs`,
  # so disable the auto-exclusion. Kyverno's own controllers don't match
  # our `imageReferences: ghcr.io/bolin8017/lolday-*`, so there's no
  # self-loop risk. Verified post-deploy by submitting an unsigned
  # ghcr.io/bolin8017/lolday-backend pod into both ns — both denied.
  config:
    excludeKyvernoNamespace: false
  # Bootstrap note (P4 deploy 2026-05-14): Kyverno's 22 CRDs with full
  # OpenAPIv3 schemas alone are >700 KB. Helm stores each release's
  # rendered manifest in a single K8s Secret (size cap 1 MiB). With the
  # CRDs rendered into the umbrella release, lolday hit
  #   "Secret sh.helm.release.v1.lolday.vNNN: Too long: may not be more
  #    than 1048576 bytes"
  # at upgrade time. Disabling `crds.install` removes the CRD docs from
  # the rendered manifest — but Kyverno still needs them in cluster.
  #
  # Workflow: CRDs are applied OUT-OF-BAND via
  #   helm template lolday-bootstrap charts/lolday <args> \
  #     | awk '/^---$/{...kind==CustomResourceDefinition...}' \
  #     | kubectl apply --server-side -f -
  # then annotated for Helm ownership via
  #   kubectl annotate crd <crd> meta.helm.sh/release-name=lolday \
  #     meta.helm.sh/release-namespace=lolday --overwrite
  #   kubectl label crd <crd> app.kubernetes.io/managed-by=Helm --overwrite
  # CRD upgrades for new Kyverno versions follow the same flow — the
  # operator re-runs the kubectl apply step before `bash scripts/deploy.sh`
  # when bumping `Chart.yaml`'s kyverno dependency.
  crds:
    install: false
    # `migration` triggers a one-shot kyverno-cli Job that ALSO needs
    # CRDs present and runs only if `crds.install: true`. Disable it
    # since we manage CRDs out-of-band.
    migration:
      enabled: false
  # Keep per-policy `failurePolicy` (default `Fail` on each ClusterPolicy)
  # in effect. Setting this to `true` would force all webhooks to
  # `Ignore` — bypassing security controls. Leave `false`.
  features:
    forceFailurePolicyIgnore:
      enabled: false
  # Single-node lab cluster: drop replicas to 1 across the four
  # controllers. Admission webhook traffic is gated by the kube-apiserver
  # retry path on failure; HA replicas mainly buffer rolling-update gaps,
  # not needed on a single node where rollout draining is sequential.
  admissionController:
    replicas: 1
  backgroundController:
    replicas: 1
  reportsController:
    replicas: 1
  cleanupController:
    replicas: 1
