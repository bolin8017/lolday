# =============================================================================
# Lolday Platform Configuration
# =============================================================================

global:
  namespace: lolday

# =============================================================================
# Private Container Registry (registry:2)
# =============================================================================
registry:
  enabled: false
  storage:
    size: 50Gi
    # Uses K3s default StorageClass (local-path)

# =============================================================================
# Training Pod Security
# =============================================================================
training:
  # NetworkPolicy: deny all egress from training pods
  networkPolicy:
    enabled: true

# =============================================================================
# Cloudflare Tunnel
# =============================================================================
cloudflare:
  enabled: true
  tunnelToken: ""       # --set at deploy time via $CF_TUNNEL_TOKEN
  replicas: 2
  image: cloudflare/cloudflared:2026.3.0    # pin explicit tag (no :latest)

# =============================================================================
# Backend API
# =============================================================================
backend:
  enabled: true
  image: harbor.lolday.svc:80/lolday/lolday-backend:phase5
  replicas: 1
  jwtSecret: ""         # --set at deploy time, NEVER commit
  firstAdmin:
    email: ""           # --set at deploy time
    password: ""        # --set at deploy time
  # NEW for Phase 3:
  fernetKey: ""                              # --set at deploy time
  harborAdminPassword: ""                    # --set at deploy time (shared with Harbor release)
  env:
    DOCS_ENABLED: "true"
    COOKIE_SECURE: "false"
    # NEW for Phase 3:
    HARBOR_URL: "http://harbor.lolday.svc.cluster.local:80"
    HARBOR_ADMIN_USERNAME: "admin"
    HARBOR_IMAGE_PREFIX: "harbor.lolday.svc:80"
    GITHUB_API_URL: "https://api.github.com"
    BUILD_NAMESPACE: "lolday"
    BUILD_IMAGE_HELPER: "harbor.lolday.svc:80/lolday/build-helper:v1"
    BUILD_IMAGE_KANIKO: "gcr.io/kaniko-project/executor:latest"
    BUILD_IMAGE_GIT: "alpine/git:v2.52.0"
    BUILD_TIMEOUT_SECONDS: "1200"
    BUILD_CONCURRENCY_PER_USER: "2"
    BACKEND_INTERNAL_URL: "http://backend.lolday.svc:8000"
    RECONCILER_ENABLED: "true"
    MLFLOW_TRACKING_URI: "http://mlflow.lolday.svc:5000"
    DATASET_CSV_MAX_BYTES: "10485760"
    JOB_HELPER_IMAGE: "harbor.lolday.svc:80/lolday/job-helper:v2"
    JOB_PER_USER_CONCURRENCY: "2"
    JOB_IDEMPOTENCY_WINDOW_SECONDS: "300"
    JOB_BACKEND_URL: "http://backend.lolday.svc:8000"
    SAMPLES_ROOT: "/mnt/samples"
    SAMPLES_LOCAL_ROOT: "/data"
    JOB_NODE_SELECTOR_HOSTNAME: "server30"

# =============================================================================
# PostgreSQL
# =============================================================================
postgresql:
  enabled: true
  storage:
    size: 10Gi
  auth:
    database: lolday
    username: lolday
    password: ""        # --set at deploy time, NEVER commit

# =============================================================================
# Redis
# =============================================================================
redis:
  enabled: true

# =============================================================================
# Harbor Container Registry
# =============================================================================
harbor:
  enabled: true
  expose:
    type: clusterIP
    tls:
      enabled: false
  externalURL: http://harbor.lolday.svc.cluster.local:80
  harborAdminPassword: ""          # --set at deploy time
  persistence:
    enabled: true
    persistentVolumeClaim:
      registry:
        size: 100Gi
      jobservice:
        size: 2Gi
      database:
        size: 5Gi
      redis:
        size: 2Gi
      trivy:
        size: 10Gi
  trivy:
    enabled: true
    skipUpdate: false
  notary:
    enabled: false
  chartmuseum:
    enabled: false
  resources:
    core:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { cpu: 1, memory: 1Gi }
    jobservice:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { cpu: 1, memory: 1Gi }
    registry:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { cpu: 1, memory: 2Gi }
    portal:
      requests: { cpu: 50m, memory: 64Mi }
      limits: { cpu: 500m, memory: 256Mi }
    database:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { cpu: 1, memory: 1Gi }
    redis:
      requests: { cpu: 50m, memory: 64Mi }
      limits: { cpu: 500m, memory: 256Mi }
    trivy:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { cpu: 1, memory: 1Gi }
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: lolday            # matches kps Prometheus selector
      interval: 60s

# =============================================================================
# MLflow Experiment Tracking
# =============================================================================
mlflow:
  enabled: true
  image: harbor.lolday.svc:80/lolday/mlflow-server:v2.20.3
  storage: 100Gi
  storageClassName: local-path
  service:
    port: 5000
  resources:
    requests: { cpu: 200m, memory: 512Mi }
    limits:   { cpu: 2, memory: 4Gi }
  db:
    username: mlflow
    database: mlflow
    password: ""   # injected via --set at deploy time (NEVER commit)

# =============================================================================
# Sample Datasets (hostPath PVs on server30)
# =============================================================================
samples:
  enabled: true
  hostPath: /data/samples
  storage: 600Gi
  nodeHostname: server30

# =============================================================================
# ML Training/Evaluation/Predict Jobs
# =============================================================================
jobs:
  helperImage: harbor.lolday.svc:80/lolday/job-helper:v2
  activeDeadlineSeconds:
    train: 21600
    evaluate: 1800
    predict: 3600
  perUserConcurrency: 2
  idempotencyWindowSeconds: 300
  networkPolicy:
    enabled: true

# =============================================================================
# Frontend (React SPA served by nginx-unprivileged)
# =============================================================================
frontend:
  image: harbor.lolday.svc:80/lolday/lolday-frontend:phase5
  host: lolday.connlabai.com
  replicas: 1
  resources:
    requests: { cpu: 10m, memory: 32Mi }
    limits:   { cpu: 100m, memory: 128Mi }

# =============================================================================
# Monitoring (Phase 6) — kube-prometheus-stack + loki + promtail
# =============================================================================
monitoring:
  enabled: true
  namespace: monitoring
  storage:
    nodePath: /mnt/ssd500g/lolday-monitoring
  grafana:
    adminPassword: ""   # --set at deploy time (from Task 7)
  postgresExporter:
    enabled: true
    image: quay.io/prometheuscommunity/postgres-exporter:v0.17.0
    password: ""        # --set at deploy time, NEVER commit
    resources:
      requests: { cpu: 20m,  memory: 64Mi }
      limits:   { cpu: 100m, memory: 128Mi }

# Sub-chart config consumed as values of the kube-prometheus-stack chart (alias: kps)
kps:
  namespaceOverride: monitoring
  fullnameOverride: kps
  defaultRules:
    create: true

  prometheus:
    prometheusSpec:
      retention: 15d
      retentionSize: 18GiB            # leave ~10% head-room under 20 Gi PVC
      # Scrape every ServiceMonitor in the cluster (default scopes to the Helm release label)
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      probeSelectorNilUsesHelmValues: false
      ruleSelectorNilUsesHelmValues: false
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: monitoring-local
            accessModes: [ReadWriteOnce]
            resources:
              requests:
                storage: 20Gi
      resources:
        requests: { cpu: 500m, memory: 2Gi }
        limits:   { cpu: 2,    memory: 8Gi }

  alertmanager:
    alertmanagerSpec:
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: monitoring-local
            accessModes: [ReadWriteOnce]
            resources:
              requests:
                storage: 2Gi
    # Empty receivers: alerts show up in Alertmanager UI but nothing is sent.
    # Wiring Resend/Discord is Phase 7.
    config:
      route:
        receiver: 'null'
        group_wait: 10s
        group_interval: 5m
        repeat_interval: 12h
      receivers:
        - name: 'null'

  grafana:
    persistence:
      enabled: true
      storageClassName: monitoring-local
      size: 5Gi
    # Credentials come from the Secret we create in templates/monitoring/grafana-admin-secret.yaml
    admin:
      existingSecret: grafana-admin
      userKey: admin-user
      passwordKey: admin-password
    defaultDashboardsEnabled: true
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        searchNamespace: ALL
      datasources:
        enabled: true
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits:   { cpu: 500m, memory: 1Gi }

  kubeStateMetrics: { enabled: true }
  nodeExporter:
    enabled: true

  # Disable ServiceMonitors that try to scrape K3s-hidden components (apiserver, scheduler, controller-manager).
  # K3s runs these as embedded goroutines inside the server binary; their metrics are exposed on
  # 127.0.0.1:10259/10257 which Prometheus cannot reach. Disabling silences noisy "DOWN" alerts.
  kubeApiServer:         { enabled: true }
  kubeControllerManager: { enabled: false }
  kubeScheduler:         { enabled: false }
  kubeProxy:             { enabled: false }
  kubeEtcd:              { enabled: false }

# =============================================================================
# Loki — log aggregation (single-binary mode)
# =============================================================================
loki:
  enabled: true
  # Top-level 'loki' key is consumed by the loki sub-chart directly
  deploymentMode: SingleBinary
  loki:
    commonConfig:
      replication_factor: 1
    schemaConfig:
      configs:
        - from: 2024-04-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    storage:
      type: filesystem
      bucketNames:
        chunks: loki-chunks
        ruler: loki-ruler
        admin: loki-admin
    auth_enabled: false
    limits_config:
      retention_period: 168h          # 7 days
      reject_old_samples: true
      reject_old_samples_max_age: 168h
  singleBinary:
    replicas: 1
    persistence:
      enabled: true
      storageClass: monitoring-local
      size: 30Gi
    resources:
      requests: { cpu: 200m, memory: 512Mi }
      limits:   { cpu: 1,    memory: 2Gi }
  # Scalable-mode components off
  read:    { replicas: 0 }
  write:   { replicas: 0 }
  backend: { replicas: 0 }
  # No ingress — internal only
  gateway:
    enabled: false
  # ChunksCache / ResultsCache are not needed at lab scale
  chunksCache: { enabled: false }
  resultsCache: { enabled: false }

# =============================================================================
# Promtail — DaemonSet that ships container logs to Loki
# =============================================================================
promtail:
  enabled: true
  config:
    clients:
      - url: http://loki.monitoring.svc:3100/loki/api/v1/push
    snippets:
      pipelineStages:
        - cri: {}
      extraRelabelConfigs:
        - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
          target_label: component
  resources:
    requests: { cpu: 50m,  memory: 64Mi }
    limits:   { cpu: 200m, memory: 256Mi }
  serviceMonitor:
    enabled: true
    namespace: monitoring
