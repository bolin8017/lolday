# =============================================================================
# Lolday Platform Configuration
# =============================================================================

global:
  namespace: lolday

# =============================================================================
# Private Container Registry (registry:2)
# =============================================================================
registry:
  enabled: false
  storage:
    size: 50Gi
    # Uses K3s default StorageClass (local-path)

# =============================================================================
# Training Pod Security
# =============================================================================
training:
  # NetworkPolicy: deny all egress from training pods
  networkPolicy:
    enabled: true

# =============================================================================
# Cloudflare Tunnel
# =============================================================================
cloudflare:
  enabled: false  # Enable after domain is purchased
  tunnelToken: "" # Set via --set at deploy time, NEVER commit
  replicas: 2

# =============================================================================
# Backend API
# =============================================================================
backend:
  enabled: true
  image: harbor.lolday.svc:80/lolday/lolday-backend:phase5
  replicas: 1
  jwtSecret: ""         # --set at deploy time, NEVER commit
  firstAdmin:
    email: ""           # --set at deploy time
    password: ""        # --set at deploy time
  # NEW for Phase 3:
  fernetKey: ""                              # --set at deploy time
  harborAdminPassword: ""                    # --set at deploy time (shared with Harbor release)
  env:
    DOCS_ENABLED: "true"
    COOKIE_SECURE: "false"
    # NEW for Phase 3:
    HARBOR_URL: "http://harbor.lolday.svc.cluster.local:80"
    HARBOR_ADMIN_USERNAME: "admin"
    HARBOR_IMAGE_PREFIX: "harbor.lolday.svc:80"
    GITHUB_API_URL: "https://api.github.com"
    BUILD_NAMESPACE: "lolday"
    BUILD_IMAGE_HELPER: "harbor.lolday.svc:80/lolday/build-helper:v1"
    BUILD_IMAGE_KANIKO: "gcr.io/kaniko-project/executor:latest"
    BUILD_IMAGE_GIT: "alpine/git:v2.52.0"
    BUILD_TIMEOUT_SECONDS: "1200"
    BUILD_CONCURRENCY_PER_USER: "2"
    BACKEND_INTERNAL_URL: "http://backend.lolday.svc:8000"
    RECONCILER_ENABLED: "true"
    MLFLOW_TRACKING_URI: "http://mlflow.lolday.svc:5000"
    DATASET_CSV_MAX_BYTES: "10485760"
    JOB_HELPER_IMAGE: "harbor.lolday.svc:80/lolday/job-helper:v2"
    JOB_PER_USER_CONCURRENCY: "2"
    JOB_IDEMPOTENCY_WINDOW_SECONDS: "300"
    JOB_BACKEND_URL: "http://backend.lolday.svc:8000"
    SAMPLES_ROOT: "/mnt/samples"
    SAMPLES_LOCAL_ROOT: "/data"
    JOB_NODE_SELECTOR_HOSTNAME: "server30"

# =============================================================================
# PostgreSQL
# =============================================================================
postgresql:
  enabled: true
  storage:
    size: 10Gi
  auth:
    database: lolday
    username: lolday
    password: ""        # --set at deploy time, NEVER commit

# =============================================================================
# Redis
# =============================================================================
redis:
  enabled: true

# =============================================================================
# Harbor Container Registry
# =============================================================================
harbor:
  enabled: true
  expose:
    type: clusterIP
    tls:
      enabled: false
  externalURL: http://harbor.lolday.svc.cluster.local:80
  harborAdminPassword: ""          # --set at deploy time
  persistence:
    enabled: true
    persistentVolumeClaim:
      registry:
        size: 100Gi
      jobservice:
        size: 2Gi
      database:
        size: 5Gi
      redis:
        size: 2Gi
      trivy:
        size: 10Gi
  trivy:
    enabled: true
    skipUpdate: false
  notary:
    enabled: false
  chartmuseum:
    enabled: false
  resources:
    core:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { cpu: 1, memory: 1Gi }
    jobservice:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { cpu: 1, memory: 1Gi }
    registry:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { cpu: 1, memory: 2Gi }
    portal:
      requests: { cpu: 50m, memory: 64Mi }
      limits: { cpu: 500m, memory: 256Mi }
    database:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { cpu: 1, memory: 1Gi }
    redis:
      requests: { cpu: 50m, memory: 64Mi }
      limits: { cpu: 500m, memory: 256Mi }
    trivy:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { cpu: 1, memory: 1Gi }

# =============================================================================
# MLflow Experiment Tracking
# =============================================================================
mlflow:
  enabled: true
  image: harbor.lolday.svc:80/lolday/mlflow-server:v2.20.3
  storage: 100Gi
  storageClassName: local-path
  service:
    port: 5000
  resources:
    requests: { cpu: 200m, memory: 512Mi }
    limits:   { cpu: 2, memory: 4Gi }
  db:
    username: mlflow
    database: mlflow
    password: ""   # injected via --set at deploy time (NEVER commit)

# =============================================================================
# Sample Datasets (hostPath PVs on server30)
# =============================================================================
samples:
  enabled: true
  hostPath: /data/samples
  storage: 600Gi
  nodeHostname: server30

# =============================================================================
# ML Training/Evaluation/Predict Jobs
# =============================================================================
jobs:
  helperImage: harbor.lolday.svc:80/lolday/job-helper:v2
  activeDeadlineSeconds:
    train: 21600
    evaluate: 1800
    predict: 3600
  perUserConcurrency: 2
  idempotencyWindowSeconds: 300
  networkPolicy:
    enabled: true

# =============================================================================
# Frontend (React SPA served by nginx-unprivileged)
# =============================================================================
frontend:
  image: harbor.lolday.svc:80/lolday/lolday-frontend:phase5
  host: lolday.islab.local
  replicas: 1
  resources:
    requests: { cpu: 10m, memory: 32Mi }
    limits:   { cpu: 100m, memory: 128Mi }

# =============================================================================
# Monitoring (Phase 6) — kube-prometheus-stack + loki + promtail
# =============================================================================
monitoring:
  enabled: true
  namespace: monitoring
  storage:
    # Dedicated NVMe partition so monitoring doesn't crowd the K3s root FS
    nodePath: /mnt/ssd500g/lolday-monitoring
